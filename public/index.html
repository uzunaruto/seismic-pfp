<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seismic PFP Generator</title>
<meta name="description" content="Create your own Seismic PFP with layered traits.">
<link rel="icon" href="https://pfp.seismic.website/logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060504;--bg2:#0c0a08;--bg3:#13100d;--bg4:#1a1612;
  --text:#f5f0e8;--text2:#8a7d6d;--text3:#5a5048;--text4:#3a3430;
  --accent:#C19200;--accent2:#ffd866;--accent3:#A87504;
  --glass:rgba(12,10,8,.85);--glass2:rgba(20,16,12,.9);
  --border:rgba(193,146,0,.12);--border2:rgba(245,240,232,.06);
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:rgba(193,146,0,.3);color:var(--text)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text4);border-radius:3px}
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(193,146,0,.06) 0%,transparent 70%);top:-200px;left:-150px;animation:drift 25s infinite ease-in-out}
.bg-orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(6,147,205,.04) 0%,transparent 70%);bottom:-150px;right:-100px;animation:drift 30s infinite ease-in-out reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-30px)}66%{transform:translate(-30px,40px)}}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(193,146,0,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(193,146,0,.02) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,black 30%,transparent 100%)}
.nav{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 20px;width:min(95%,1200px);background:var(--glass2);backdrop-filter:blur(40px) saturate(1.5);border:1px solid var(--border);border-radius:60px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.nav-logo{width:32px;height:32px;border-radius:50%;object-fit:contain;filter:drop-shadow(0 0 6px rgba(193,146,0,.3));border:2px solid var(--border);background:var(--bg3)}
.nav-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:6px}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:50px;font-size:11px;font-weight:600;color:var(--text2);text-decoration:none;border:1px solid var(--border2);transition:all .25s}
.nav-link:hover{color:var(--text);border-color:var(--border);background:rgba(193,146,0,.04)}
.nav-link svg{width:13px;height:13px;fill:currentColor}
.app{max-width:1200px;margin:0 auto;padding:72px 20px 60px;position:relative;z-index:1}
.layout{display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start}
.preview-col{position:sticky;top:80px;display:flex;flex-direction:column;align-items:center;gap:16px}
.preview-wrap{position:relative}
.preview-glow{position:absolute;inset:-16px;border-radius:50%;z-index:0;background:radial-gradient(circle,rgba(193,146,0,.08) 0%,transparent 70%);animation:glow-breathe 4s ease-in-out infinite}
@keyframes glow-breathe{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
.preview-frame{position:relative;z-index:1;width:320px;height:320px;border-radius:50%;overflow:hidden;border:3px solid rgba(193,146,0,.2);box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 30px rgba(193,146,0,.06)}
.preview-frame canvas{width:100%;height:100%;display:block}
.gen-overlay{position:absolute;inset:0;background:rgba(6,5,4,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:10;border-radius:50%}
.gen-overlay.active{display:flex}
.gen-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-text{font-size:11px;color:var(--text3);text-align:center}
.gen-dots{font-size:11px;color:var(--accent);min-width:60px;text-align:center}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s;background:var(--glass);color:var(--text2);letter-spacing:.3px}
.btn:hover{transform:translateY(-2px);border-color:var(--border);color:var(--text);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;border-color:transparent;font-weight:700}
.btn-primary:hover{box-shadow:0 10px 28px rgba(193,146,0,.35);transform:translateY(-3px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.controls-col{display:flex;flex-direction:column;gap:14px}
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:12px 14px;background:var(--glass);border:1px solid var(--border2);border-radius:var(--radius)}
.cat-tab{padding:7px 12px;border-radius:var(--radius-xs);border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px;white-space:nowrap}
.cat-tab:hover{border-color:var(--border);color:var(--text2)}
.cat-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(193,146,0,.08);box-shadow:0 0 10px rgba(193,146,0,.1)}
.trait-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:4px}
.trait-btn{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:var(--bg3);border:2px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;padding:4px}
.trait-btn img{width:100%;height:100%;object-fit:cover;border-radius:calc(var(--radius-sm) - 4px);transition:transform .2s}
.trait-btn:hover{border-color:var(--border);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.3)}
.trait-btn:hover img{transform:scale(1.05)}
.trait-btn.active{border-color:var(--accent);box-shadow:0 0 16px rgba(193,146,0,.15),0 0 0 1px rgba(193,146,0,.2) inset}
.trait-btn .label{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:8px;font-weight:700;color:var(--text);background:rgba(0,0,0,.6);padding:2px 4px;backdrop-filter:blur(4px);letter-spacing:.5px;text-transform:uppercase}
.trait-btn .check{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:900;z-index:2}
.trait-btn.active .check{display:flex}
.trait-btn.none-btn{background:var(--bg4);border-style:dashed}
.trait-btn.none-btn::after{content:'✕';font-size:20px;color:var(--text3)}
.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title h3{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.section-title .count{font-size:11px;color:var(--text3)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);padding:10px 20px;background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius-sm);backdrop-filter:blur(30px);font-size:12px;font-weight:600;color:var(--text);z-index:200;transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 10px 30px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.footer{position:relative;z-index:1;text-align:center;padding:24px;border-top:1px solid var(--border2);margin-top:40px}
.footer p{font-size:11px;color:var(--text3)}
.footer a{color:var(--accent);text-decoration:none;font-weight:600}
@media(max-width:900px){
  .layout{grid-template-columns:1fr;gap:20px}
  .preview-col{position:static}
  .preview-frame{width:280px;height:280px}
  .nav{top:8px;padding:8px 14px;width:97%}
  .trait-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
  .preview-frame{width:240px;height:240px}
  .trait-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="bg-fx"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
<div class="bg-grid"></div>
<nav class="nav">
  <a href="https://seismic-identity.vercel.app" class="nav-brand">
    <img src="https://pfp.seismic.website/logo.svg" alt="Seismic" class="nav-logo" onerror="this.style.display='none'">
    <span class="nav-title">SEISMIC PFP</span>
  </a>
  <div class="nav-links">
    <a href="https://x.com/SeismicSys" target="_blank" rel="noopener" class="nav-link"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>X</a>
    <a href="https://discord.gg/seismic" target="_blank" rel="noopener" class="nav-link"><svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>Discord</a>
  </div>
</nav>
<div class="app">
  <div class="layout">
    <div class="preview-col">
      <div class="preview-wrap">
        <div class="preview-glow"></div>
        <div class="preview-frame">
          <canvas id="previewCanvas" width="800" height="800"></canvas>
          <div class="gen-overlay" id="genOverlay">
            <div class="gen-spinner"></div>
            <div class="gen-text">Generating character...</div>
            <div class="gen-dots" id="genDots">0s</div>
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="downloadBtn" onclick="downloadPFP()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download
        </button>
        <button class="btn" onclick="randomize()">
          <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg> Randomize
        </button>
        <button class="btn" onclick="resetAll()">
          <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> Reset
        </button>
      </div>
    </div>
    <div class="controls-col">
      <div class="cat-tabs" id="catTabs"></div>
      <div>
        <div class="section-title">
          <h3 id="catTitle">🎨 Backgrounds</h3>
          <span class="count" id="catCount">0 selected</span>
        </div>
        <div class="trait-grid" id="traitGrid"></div>
      </div>
    </div>
  </div>
</div>
<footer class="footer"><p>Built for <a href="https://discord.gg/seismic">Seismic</a> · <a href="https://x.com/SeismicSys">@SeismicSys</a></p></footer>
<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  {key:'Background',icon:'🎨',label:'Backgrounds',layer:-1},
  {key:'Model',icon:'🧱',label:'Model',layer:0},
  {key:'Clothes',icon:'👕',label:'Clothes',layer:1},
  {key:'Tattoo',icon:'✒️',label:'Tattoo',layer:2},
  {key:'Eyes',icon:'👀',label:'Eyes',layer:3},
  {key:'Eyebrow',icon:'🤨',label:'Eyebrow',layer:4},
  {key:'Glasses',icon:'🕶️',label:'Glasses',layer:5},
  {key:'Weapon',icon:'⚔️',label:'Weapon',layer:6},
  {key:'Hat',icon:'🎩',label:'Hat',layer:7},
  {key:'Mouth',icon:'👄',label:'Mouth',layer:8},
  {key:'Hair',icon:'💇',label:'Hair',layer:9},
];

const ITEM_COUNTS = {
  Background:10,Model:8,Clothes:8,Tattoo:8,
  Eyes:8,Eyebrow:7,Glasses:8,Weapon:10,
  Hat:10,Mouth:8,Hair:10,
};

const LABELS = {
  Model:{1:'Rock',2:'Robot',3:'Cat',4:'Skull',5:'Alien',6:'Ninja',7:'Pirate',8:'Wizard'},
  Background:{1:'Space',2:'Lava',3:'Ocean',4:'Forest',5:'Cyber',6:'Sakura',7:'Ice',8:'Desert',9:'Candy',10:'Haunted'},
  Clothes:{1:'Hero',2:'Suit',3:'Hoodie',4:'Pirate',5:'Knight',6:'Kimono',7:'Space',8:'Wizard'},
  Tattoo:{1:'Skull',2:'Rose',3:'Dragon',4:'Lightning',5:'Heart',6:'Tribal',7:'Snake',8:'Flame'},
  Eyes:{1:'Sparkle',2:'Laser',3:'Heart',4:'Star',5:'Spiral',6:'Robot',7:'Happy',8:'Hetero'},
  Eyebrow:{1:'Angry',2:'Surprise',3:'Unibrow',4:'Skeptical',5:'Lightning',6:'Rainbow',7:'Fire'},
  Glasses:{1:'Round',2:'Aviator',3:'Heart',4:'3D',5:'Steam',6:'Star',7:'Sport',8:'Narrow'},
  Weapon:{1:'Broom',2:'Wand',3:'Sword',4:'Fishing',5:'Chicken',6:'Lollipop',7:'Boombox',8:'Foam',9:'Banana',10:'Selfie'},
  Hat:{1:'Top Hat',2:'Party',3:'Cowboy',4:'Chef',5:'Wizard',6:'Pirate',7:'Cap',8:'Flower',9:'Viking',10:'Propeller'},
  Mouth:{1:'Smile',2:'Whistle',3:'Tongue',4:'Fangs',5:'Duck',6:'Pizza',7:'Gum',8:'Cat'},
  Hair:{1:'Spiky',2:'Flowing',3:'Mohawk',4:'Afro',5:'Pigtails',6:'Slick',7:'Messy',8:'Bald',9:'Braids',10:'Rainbow'},
};

// Model descriptions for prompt building
const MODEL_DESC = {
  1: 'a rock golem character with stone texture body',
  2: 'a shiny chrome robot character with metallic body',
  3: 'a cute cat character with fur and whiskers',
  4: 'a skull character with bone texture',
  5: 'an alien character with green skin and antennae',
  6: 'a ninja character in black outfit with mask',
  7: 'a pirate character with eyepatch and bandana',
  8: 'a wizard character with long beard and robes',
};

const STYLE = '3D render Pixar chibi style, half-body chest-up portrait, cute animated character, smooth shading, thick outlines, high quality digital art';

const CACHE_PREFIX = 'pfpv3_';
const CACHE_MAX = 200;

const state = {};
const rawImages = {}; // thumbnails for selection grid only
let activeCat = 'Background';
let loaded = 0;
let total = Object.values(ITEM_COUNTS).reduce((a,b)=>a+b,0);
let generating = false;
let genAbort = null;
let genTimer = null;
let lastRenderedKey = '';

function preloadThumbnails() {
  CATEGORIES.forEach(cat => {
    const count = ITEM_COUNTS[cat.key];
    for (let i = 1; i <= count; i++) {
      const key = `${cat.key}/${i}`;
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        rawImages[key] = img;
        loaded++;
        if (loaded >= total) {
          renderCachedOrThumb(); // initial render from thumbnails while generation starts
        }
      };
      img.onerror = () => {
        loaded++;
        if (loaded >= total) renderCachedOrThumb();
      };
      img.src = `/pfp/${cat.key}/${i}.png`;
    }
  });
}

function init() {
  CATEGORIES.forEach(cat => { state[cat.key] = null; });
  state['Background'] = 1;
  state['Model'] = 1;

  const tabsEl = document.getElementById('catTabs');
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (cat.key === activeCat ? ' active' : '');
    btn.textContent = `${cat.icon} ${cat.label}`;
    btn.onclick = () => switchCategory(cat.key);
    tabsEl.appendChild(btn);
  });

  buildTraitGrid();
  preloadThumbnails();
}

function switchCategory(key) {
  activeCat = key;
  document.querySelectorAll('.cat-tab').forEach((t, i) => {
    t.classList.toggle('active', CATEGORIES[i].key === key);
  });
  buildTraitGrid();
}

function buildTraitGrid() {
  const grid = document.getElementById('traitGrid');
  const cat = CATEGORIES.find(c => c.key === activeCat);
  const count = ITEM_COUNTS[cat.key];
  const labels = LABELS[cat.key] || {};
  
  document.getElementById('catTitle').textContent = `${cat.icon} ${cat.label}`;
  const selected = Object.values(state).filter(v => v !== null).length;
  document.getElementById('catCount').textContent = `${selected} trait(s) selected`;
  grid.innerHTML = '';

  if (cat.key !== 'Model' && cat.key !== 'Background') {
    const noneBtn = document.createElement('button');
    noneBtn.className = 'trait-btn none-btn' + (state[cat.key] === null ? ' active' : '');
    noneBtn.onclick = () => selectItem(cat.key, null);
    grid.appendChild(noneBtn);
  }

  for (let i = 1; i <= count; i++) {
    const btn = document.createElement('button');
    btn.className = 'trait-btn' + (state[cat.key] === i ? ' active' : '');
    
    const img = document.createElement('img');
    img.src = `/pfp/${cat.key}/${i}.png`;
    img.alt = labels[i] || `#${i}`;
    img.loading = 'lazy';
    btn.appendChild(img);

    const check = document.createElement('span');
    check.className = 'check';
    check.textContent = '✓';
    btn.appendChild(check);

    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = labels[i] || `#${i}`;
    btn.appendChild(label);

    btn.onclick = () => selectItem(cat.key, i);
    grid.appendChild(btn);
  }
}

function selectItem(catKey, itemId) {
  state[catKey] = itemId;
  buildTraitGrid();
  
  if (catKey === 'Background') {
    // Background just redraws from cache/thumbnails
    renderCachedOrThumb();
  } else {
    // Trait/model change → generate new character
    generateCharacter();
  }
}

// Build cache key from current state
function getCacheKey() {
  const parts = CATEGORIES
    .filter(c => c.key !== 'Background')
    .map(c => `${c.key}${state[c.key] || 0}`);
  return CACHE_PREFIX + parts.join('_');
}

// Build prompt from current state
function buildPrompt() {
  const modelId = state['Model'] || 1;
  const modelDesc = MODEL_DESC[modelId] || MODEL_DESC[1];
  
  const traits = [];
  const traitCats = ['Clothes','Tattoo','Eyes','Eyebrow','Glasses','Weapon','Hat','Mouth','Hair'];
  traitCats.forEach(cat => {
    const itemId = state[cat];
    if (itemId) {
      const label = LABELS[cat]?.[itemId] || '';
      if (label) {
        const catLower = cat.toLowerCase();
        traits.push(`${label.toLowerCase()} ${catLower}`);
      }
    }
  });
  
  const bgId = state['Background'] || 1;
  const bgLabel = (LABELS['Background']?.[bgId] || 'space').toLowerCase();
  const bgPrompt = bgLabel === 'space' ? 'deep space nebula with stars' :
    bgLabel === 'lava' ? 'volcanic lava and magma' :
    bgLabel === 'ocean' ? 'deep ocean underwater with coral' :
    bgLabel === 'forest' ? 'enchanted magical forest' :
    bgLabel === 'cyber' ? 'neon cyberpunk city' :
    bgLabel === 'sakura' ? 'cherry blossom sakura petals' :
    bgLabel === 'ice' ? 'aurora borealis ice crystals' :
    bgLabel === 'desert' ? 'golden desert sunset dunes' :
    bgLabel === 'candy' ? 'colorful candy and sweets' :
    bgLabel === 'haunted' ? 'spooky haunted house' : 'abstract background';
  
  let prompt = `${STYLE}, ${modelDesc}`;
  if (traits.length > 0) {
    prompt += ` wearing ${traits.join(', ')}`;
  }
  prompt += `, solid flat pure black background`;
  
  return { prompt, bgPrompt };
}

// Remove near-black pixels from generated image (black background removal)
function removeBlackBg(img) {
  const c = document.createElement('canvas');
  const S = 512;
  c.width = S; c.height = S;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, S, S);
  
  const imgData = ctx.getImageData(0, 0, S, S);
  const d = imgData.data;
  
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    // Near-black → transparent
    if (r < 30 && g < 30 && b < 30) {
      d[i+3] = 0;
    }
    // Semi-dark → semi-transparent (anti-alias)
    else if (r < 50 && g < 50 && b < 50) {
      const brightness = (r + g + b) / 3;
      d[i+3] = Math.round((brightness / 50) * 255);
    }
  }
  
  ctx.putImageData(imgData, 0, 0);
  return c;
}

// Generate background image from Pollinations
async function generateBg(bgPrompt) {
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(bgPrompt + ', digital art, vibrant, high quality, 512x512')}?width=512&height=512&seed=42&nologo=true`;
  const resp = await fetch(url);
  const blob = await resp.blob();
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(blob);
  });
}

// Generate character via Pollinations API
async function generateCharacter() {
  const cacheKey = getCacheKey();
  
  // Check cache first
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    renderFromCache(cached);
    return;
  }
  
  // Cancel previous generation
  if (genAbort) genAbort.abort();
  genAbort = new AbortController();
  
  generating = true;
  showGenOverlay(true);
  
  const { prompt, bgPrompt } = buildPrompt();
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&seed=${Math.floor(Math.random()*10000)}&nologo=true`;
  
  let elapsed = 0;
  genTimer = setInterval(() => {
    elapsed++;
    const dots = document.getElementById('genDots');
    if (dots) dots.textContent = `${elapsed}s`;
  }, 1000);
  
  try {
    const resp = await fetch(url, { signal: genAbort.signal });
    const blob = await resp.blob();
    
    const img = new Image();
    img.onload = () => {
      // Remove black background
      const charCanvas = removeBlackBg(img);
      
      // Cache as data URL
      const dataUrl = charCanvas.toDataURL('image/png');
      try {
        localStorage.setItem(cacheKey, dataUrl);
        pruneCache();
      } catch(e) { /* quota exceeded, skip */ }
      
      // Render
      renderComposite(charCanvas);
      showGenOverlay(false);
      generating = false;
      lastRenderedKey = cacheKey;
    };
    img.src = URL.createObjectURL(blob);
  } catch(e) {
    if (e.name !== 'AbortError') {
      console.error('Generation failed:', e);
      showToast('⚠️ Generation failed, try again');
    }
    showGenOverlay(false);
    generating = false;
  }
  
  clearInterval(genTimer);
}

// Render from cached data URL
function renderFromCache(dataUrl) {
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, 512, 512);
    renderComposite(c);
  };
  img.src = dataUrl;
}

// Final render: background + character composite
async function renderComposite(charCanvas) {
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const S = 800;
  canvas.width = S;
  canvas.height = S;
  ctx.clearRect(0, 0, S, S);
  
  // Circular clip
  ctx.save();
  ctx.beginPath();
  ctx.arc(S/2, S/2, S/2, 0, Math.PI * 2);
  ctx.clip();
  
  // Draw background
  const bgId = state['Background'] || 1;
  const bgImg = rawImages[`Background/${bgId}`];
  if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
    ctx.drawImage(bgImg, 0, 0, S, S);
  } else {
    // Solid fallback
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, S, S);
  }
  
  // Draw character (centered, slightly offset down)
  if (charCanvas) {
    const cw = charCanvas.width || 512;
    const ch = charCanvas.height || 512;
    const scale = S / cw;
    const yOff = 30 * (S / 800); // slight downward offset
    ctx.drawImage(charCanvas, 0, yOff, cw * scale, ch * scale);
  }
  
  ctx.restore();
}

// Render with just thumbnails (initial state or background-only change)
function renderCachedOrThumb() {
  const cacheKey = getCacheKey();
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    renderFromCache(cached);
    return;
  }
  
  // Fallback: render model thumbnail + background
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const S = 800;
  canvas.width = S;
  canvas.height = S;
  ctx.clearRect(0, 0, S, S);
  
  ctx.save();
  ctx.beginPath();
  ctx.arc(S/2, S/2, S/2, 0, Math.PI * 2);
  ctx.clip();
  
  // Background
  const bgId = state['Background'] || 1;
  const bgImg = rawImages[`Background/${bgId}`];
  if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
    ctx.drawImage(bgImg, 0, 0, S, S);
  }
  
  // Model thumbnail
  const modelId = state['Model'] || 1;
  const modelImg = rawImages[`Model/${modelId}`];
  if (modelImg && modelImg.complete && modelImg.naturalWidth > 0) {
    ctx.drawImage(modelImg, 0, 0, S, S);
  }
  
  ctx.restore();
  
  // Trigger generation if not already generating
  if (!generating) generateCharacter();
}

function showGenOverlay(show) {
  const overlay = document.getElementById('genOverlay');
  if (show) {
    overlay.classList.add('active');
    const dots = document.getElementById('genDots');
    if (dots) dots.textContent = '0s';
  } else {
    overlay.classList.remove('active');
  }
}

function pruneCache() {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(CACHE_PREFIX)) keys.push(k);
  }
  while (keys.length > CACHE_MAX) {
    localStorage.removeItem(keys.shift());
  }
}

function randomize() {
  CATEGORIES.forEach(cat => {
    const count = ITEM_COUNTS[cat.key];
    state[cat.key] = Math.floor(Math.random() * count) + 1;
  });
  buildTraitGrid();
  generateCharacter();
  showToast('🎲 Randomized');
}

function resetAll() {
  CATEGORIES.forEach(cat => {
    state[cat.key] = (cat.key === 'Background' || cat.key === 'Model') ? 1 : null;
  });
  buildTraitGrid();
  generateCharacter();
  showToast('🔄 Reset');
}

function downloadPFP() {
  const expCanvas = document.createElement('canvas');
  const S = 1024;
  expCanvas.width = S;
  expCanvas.height = S;
  const ctx = expCanvas.getContext('2d');

  ctx.beginPath();
  ctx.arc(S/2, S/2, S/2, 0, Math.PI * 2);
  ctx.clip();

  // Get current preview canvas content
  const preview = document.getElementById('previewCanvas');
  ctx.drawImage(preview, 0, 0, S, S);

  const link = document.createElement('a');
  link.download = 'seismic-pfp.png';
  link.href = expCanvas.toDataURL('image/png');
  link.click();
  showToast('📥 Downloaded');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
