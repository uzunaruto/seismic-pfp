<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seismic PFP Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a25;--border:#2a2a3a;
  --text:#e0e0e8;--text2:#8888aa;--accent:#00aaff;--accent2:#0088cc;
  --danger:#ff3355;--success:#00cc88;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100dvh;overflow-x:hidden}
.app{display:flex;min-height:100dvh}
.preview{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:sticky;top:0;height:100dvh}
.preview canvas{border-radius:16px;box-shadow:0 0 60px rgba(0,170,255,0.15);max-width:min(480px,90vw);max-height:min(480px,90vw)}
.preview h1{font-size:1.4rem;font-weight:800;margin-bottom:1rem;background:linear-gradient(135deg,var(--accent),#66ddff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.preview .actions{display:flex;gap:0.8rem;margin-top:1.2rem}
.btn{padding:0.6rem 1.4rem;border-radius:10px;border:none;font-family:inherit;font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-ghost:hover{background:rgba(0,170,255,0.1)}
.controls{width:380px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;height:100dvh;padding:1.5rem}
.controls h2{font-size:1rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1rem}
.gender-toggle{display:flex;gap:0.5rem;margin-bottom:1.5rem}
.gender-btn{flex:1;padding:0.7rem;border-radius:10px;border:2px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.2s;text-align:center}
.gender-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,170,255,0.08)}
.category{margin-bottom:1.2rem}
.category-header{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0.8rem;background:var(--surface2);border-radius:10px;cursor:pointer;margin-bottom:0.5rem;transition:all 0.2s}
.category-header:hover{background:rgba(0,170,255,0.08)}
.category-header h3{font-size:0.85rem;font-weight:700;display:flex;align-items:center;gap:0.5rem}
.category-header .arrow{transition:transform 0.2s;color:var(--text2)}
.category-header.open .arrow{transform:rotate(180deg)}
.trait-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;padding:0.3rem 0}
.trait-btn{aspect-ratio:1;border-radius:10px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;font-size:1.8rem;position:relative;overflow:hidden}
.trait-btn:hover{border-color:var(--accent);transform:scale(1.05)}
.trait-btn.active{border-color:var(--accent);box-shadow:0 0 12px rgba(0,170,255,0.3)}
.trait-btn.none{font-size:0.7rem;color:var(--text2);font-weight:600}
.trait-btn .label{position:absolute;bottom:0;left:0;right:0;padding:2px;background:rgba(0,0,0,0.7);font-size:0.55rem;text-align:center;color:var(--text);font-weight:600}
@media(max-width:860px){.app{flex-direction:column}.controls{width:100%;height:auto;border-left:none;border-top:1px solid var(--border)}.preview{height:auto;position:static;padding:1rem}}
</style>
</head>
<body>
<div class="app">
  <div class="preview">
    <h1>⚡ SEISMIC PFP</h1>
    <canvas id="canvas" width="1000" height="1000"></canvas>
    <div class="actions">
      <button class="btn btn-primary" onclick="downloadPFP()">⬇ Download PNG</button>
      <button class="btn btn-ghost" onclick="randomize()">🎲 Random</button>
    </div>
  </div>
  <div class="controls" id="controls">
    <h2>⚡ Customize</h2>
    <div class="gender-toggle">
      <button class="gender-btn active" data-gender="male" onclick="setGender('male')">♂ Male</button>
      <button class="gender-btn" data-gender="female" onclick="setGender('female')">♀ Female</button>
    </div>
    <div id="categories"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════

  ], female:[

  ]},
  { id:'hair', name:'Hair', icon:'💇', gendered:true, traits:[

    {id:'spiky',label:'Spiky',emoji:'🦔'},{id:'fade',label:'Fade',emoji:'💈'},

    {id:'curly',label:'Curly',emoji:'🌀'},{id:'ponytail',label:'Pony',emoji:'🎀'},
    {id:'long',label:'Long',emoji:'🧑‍🎤'},{id:'afro',label:'Afro',emoji:'☁️'}
  ], female:[
    {id:'none',label:'Bald',emoji:'✖'},{id:'long',label:'Long',emoji:'💇‍♀️'},
    {id:'bob',label:'Bob',emoji:'💇'},{id:'curly',label:'Curly',emoji:'🌀'},
    {id:'ponytail',label:'Ponytail',emoji:'🎀'},{id:'buns',label:'Buns',emoji:'🍡'},
    {id:'braids',label:'Braids',emoji:'🪢'},{id:'pixie',label:'Pixie',emoji:'✂️'},
    {id:'wavy',label:'Wavy',emoji:'🌊'},{id:'afro',label:'Afro',emoji:'☁️'}
  ]},
  { id:'eyes', name:'Eyes', icon:'👁', traits:[
    {id:'default',label:'Default',emoji:'👀'},{id:'angry',label:'Angry',emoji:'😠'},
    {id:'happy',label:'Happy',emoji:'😊'},{id:'sad',label:'Sad',emoji:'😢'},
    {id:'cool',label:'Cool',emoji:'😎'},{id:'shock',label:'Shock',emoji:'😱'},
    {id:'wink',label:'Wink',emoji:'😉'},{id:'anime',label:'Anime',emoji:'🥺'}
  ]},
  { id:'eyebrows', name:'Eyebrows', icon:'🤨', traits:[
    {id:'default',label:'Default',emoji:'─'},{id:'angry',label:'Angry',emoji:'╲'},
    {id:'raised',label:'Raised',emoji:'⌒'},{id:'thin',label:'Thin',emoji:'〰'},

  ]},
  { id:'mouth', name:'Mouth', icon:'👄', traits:[
    {id:'neutral',label:'Neutral',emoji:'─'},{id:'smile',label:'Smile',emoji:'😊'},
    {id:'grin',label:'Grin',emoji:'😁'},{id:'smirk',label:'Smirk',emoji:'😏'},
    {id:'open',label:'Open',emoji:'😮'},{id:'frown',label:'Frown',emoji:'☹️'},
    {id:'tongue',label:'Tongue',emoji:'😛'},{id:'fangs',label:'Fangs',emoji:'🧛'}
  ]},
  { id:'glasses', name:'Glasses', icon:'👓', traits:[
    {id:'none',label:'None',emoji:'✖'},{id:'round',label:'Round',emoji:'🧐'},
    {id:'squares',label:'Square',emoji:'🤓'},{id:'shades',label:'Shades',emoji:'😎'},
    {id:'visor',label:'Visor',emoji:'🥽'},{id:'monocle',label:'Monocle',emoji:'🧐'}
  ]},
  { id:'hat', name:'Hat', icon:'🎩', gendered:true, traits:[
    {id:'none',label:'None',emoji:'✖'},{id:'cap',label:'Cap',emoji:'🧢'},
    {id:'beanie',label:'Beanie',emoji:'🎿'},{id:'hood',label:'Hood',emoji:'🧥'},
    {id:'crown',label:'Crown',emoji:'👑'},{id:'helmet',label:'Helmet',emoji:'⛑'},
    {id:'headband',label:'Band',emoji:'🎀'},{id:'seismic_cap',label:'Seismic',emoji:'⚡'}
  ], female:[
    {id:'none',label:'None',emoji:'✖'},{id:'cap',label:'Cap',emoji:'🧢'},
    {id:'beanie',label:'Beanie',emoji:'🎿'},{id:'bow',label:'Bow',emoji:'🎀'},
    {id:'crown',label:'Crown',emoji:'👑'},{id:'flower',label:'Flower',emoji:'🌸'},
    {id:'headband',label:'Band',emoji:'🎀'},{id:'seismic_cap',label:'Seismic',emoji:'⚡'}
  ]},
  { id:'tattoo', name:'Tattoo', icon:'🖋', traits:[
    {id:'none',label:'None',emoji:'✖'},{id:'lightning',label:'Lightning',emoji:'⚡'},
    {id:'tribal',label:'Tribal',emoji:'🔥'},{id:'skull',label:'Skull',emoji:'💀'},
    {id:'snake',label:'Snake',emoji:'🐍'},{id:'wave',label:'Wave',emoji:'🌊'}
  ]},
  { id:'weapon', name:'Weapon', icon:'⚔️', traits:[
    {id:'none',label:'None',emoji:'✖'},{id:'sword',label:'Sword',emoji:'⚔️'},
    {id:'axe',label:'Axe',emoji:'🪓'},{id:'staff',label:'Staff',emoji:'🏑'},
    {id:'gun',label:'Gun',emoji:'🔫'},{id:'shield',label:'Shield',emoji:'🛡️'}
  ]},
  { id:'accessories', name:'Accessories', icon:'💍', traits:[
    {id:'none',label:'None',emoji:'✖'},{id:'chain',label:'Chain',emoji:'⛓️'},
    {id:'earring',label:'Earring',emoji:'💎'},{id:'watch',label:'Watch',emoji:'⌚'},
    {id:'bandana',label:'Bandana',emoji:'🎀'},{id:'scar',label:'Scar',emoji:'🤕'}
  ]}
];

// ═══════════════════════════════════════════════════
// COLORS — Cel-shaded anime palette
// ═══════════════════════════════════════════════════
const C = {
  // Skin
  skin: '#f0d0a0', skinShadow: '#d4a878', skinHighlight: '#ffe0c0',
  // Hair colors
  hairBlack: '#1a1a2e', hairBrown: '#4a3728', hairBlonde: '#e8c860',
  hairRed: '#8b2020', hairBlue: '#1a4a8b', hairWhite: '#d8d8e8',
  // Clothing
  clothBlack: '#1a1a1a', clothWhite: '#e8e8e8', clothBlue: '#0055aa',
  clothRed: '#aa2020', clothGreen: '#206620', clothGray: '#555566',
  // Accents
  accent: '#00aaff', accentDark: '#006699', accentGlow: '#44ccff',
  // Outline
  outline: '#0a0a14', outlineLight: '#2a2a3a',
  // Eyes
  eyeWhite: '#f8f8ff', eyeIris: '#1a3a6a', eyePupil: '#0a0a14',
  eyeHighlight: '#ffffff',
  // Seismic
  seismicPrimary: '#00aaff', seismicSecondary: '#ff6600', seismicGold: '#ffaa00',
  // Backgrounds
  bgDark: '#0a0a14', bgBlue: '#0a1a2e', bgRed: '#1a0a0a',
  bgGreen: '#0a1a0a', bgPurple: '#1a0a2e', bgGold: '#1a1a0a',
};

// ═══════════════════════════════════════════════════
// RENDERER — All Canvas drawing happens here
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 1000, H = 1000;

function render() {
  ctx.clearRect(0, 0, W, H);

  // Draw layers in order (back to front)
  drawBackground();
  drawBody();
  drawTattoo();
  drawClothing();
  drawNeck();
  drawHead();
  drawEyes();
  drawEyebrows();
  drawMouth();
  drawNose();
  drawHair();
  drawGlasses();
  drawHat();
  drawAccessories();
  drawWeapon();
  drawEffects();
}

// ── BACKGROUND ──
function drawBackground() {
  const bg = STATE.traits.background;
  if (bg === 'bg_dark') {
    ctx.fillStyle = C.bgDark;
    ctx.fillRect(0, 0, W, H);
  } else if (bg === 'bg_blue') {
    ctx.fillStyle = C.bgBlue;
    ctx.fillRect(0, 0, W, H);
  } else if (bg === 'bg_red') {
    ctx.fillStyle = C.bgRed;
    ctx.fillRect(0, 0, W, H);
  } else if (bg === 'bg_green') {
    ctx.fillStyle = C.bgGreen;
    ctx.fillRect(0, 0, W, H);
  } else if (bg === 'bg_purple') {
    ctx.fillStyle = C.bgPurple;
    ctx.fillRect(0, 0, W, H);
  } else if (bg === 'bg_gold') {
    ctx.fillStyle = C.bgGold;
    ctx.fillRect(0, 0, W, H);
  } else if (bg === 'bg_gradient1') {
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, '#0a002e'); g.addColorStop(0.5, '#1a0a3e');
    g.addColorStop(1, '#0a1a2e');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // Neon grid lines
    ctx.strokeStyle = 'rgba(0,170,255,0.15)'; ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 50) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
    }
  } else if (bg === 'bg_gradient2') {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a0a0a'); g.addColorStop(0.4, '#2a1a0a');
    g.addColorStop(0.7, '#1a0a1a'); g.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  } else if (bg === 'bg_seismic') {
    // Seismic branded background
    const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 600);
    g.addColorStop(0, '#0a1a2e'); g.addColorStop(1, '#0a0a14');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // Seismic wave lines
    ctx.strokeStyle = 'rgba(0,170,255,0.2)'; ctx.lineWidth = 2;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      for (let x = 0; x < W; x += 5) {
        const y = H/2 + Math.sin((x + i * 80) * 0.02) * (60 + i * 30) * Math.sin(x * 0.005);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }
}

// ── BODY ──
function drawBody() {
  const isFemale = STATE.gender === 'female';

  // Neck (drawn separately in drawNeck for layering)

  // Shoulders & torso
  ctx.fillStyle = C.skin;
  ctx.beginPath();
  ctx.moveTo(350, 650); // left shoulder
  ctx.quadraticCurveTo(400, 600, 500, 590); // shoulder curve
  ctx.quadraticCurveTo(600, 600, 650, 650); // right shoulder
  ctx.lineTo(700, 900); // right side
  ctx.quadraticCurveTo(700, 950, 650, 1000); // bottom right
  ctx.lineTo(350, 1000); // bottom
  ctx.quadraticCurveTo(300, 950, 300, 900); // bottom left
  ctx.closePath();
  ctx.fill();

  // Shadow on body (cel-shade)
  ctx.fillStyle = C.skinShadow;
  ctx.beginPath();
  ctx.moveTo(350, 650);
  ctx.quadraticCurveTo(380, 620, 420, 610);
  ctx.lineTo(420, 900);
  ctx.quadraticCurveTo(380, 920, 350, 900);
  ctx.closePath();
  ctx.fill();

  // Right side shadow
  ctx.beginPath();
  ctx.moveTo(650, 650);
  ctx.quadraticCurveTo(620, 620, 580, 610);
  ctx.lineTo(580, 900);
  ctx.quadraticCurveTo(620, 920, 650, 900);
  ctx.closePath();
  ctx.fill();

  // Arms
  drawArm(300, 680, 'left');
  drawArm(700, 680, 'right');

  // Body outline
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(350, 650);
  ctx.quadraticCurveTo(400, 600, 500, 590);
  ctx.quadraticCurveTo(600, 600, 650, 650);
  ctx.lineTo(700, 900);
  ctx.quadraticCurveTo(700, 950, 650, 1000);
  ctx.lineTo(350, 1000);
  ctx.quadraticCurveTo(300, 950, 300, 900);
  ctx.closePath();
  ctx.stroke();
}

function drawArm(x, side) {
  const dir = side === 'left' ? -1 : 1;
  ctx.fillStyle = C.skin;
  ctx.beginPath();
  ctx.moveTo(x, 680);
  ctx.quadraticCurveTo(x + dir * 40, 720, x + dir * 50, 800);
  ctx.quadraticCurveTo(x + dir * 55, 870, x + dir * 45, 920);
  // Hand
  ctx.quadraticCurveTo(x + dir * 40, 940, x + dir * 30, 950);
  ctx.quadraticCurveTo(x + dir * 15, 945, x + dir * 20, 920);
  ctx.quadraticCurveTo(x + dir * 25, 870, x + dir * 20, 800);
  ctx.quadraticCurveTo(x + dir * 10, 720, x, 700);
  ctx.closePath();
  ctx.fill();

  // Arm shadow
  ctx.fillStyle = C.skinShadow;
  ctx.beginPath();
  if (side === 'left') {
    ctx.moveTo(x, 680);
    ctx.quadraticCurveTo(x - 30, 720, x - 40, 800);
    ctx.lineTo(x - 20, 800);
    ctx.quadraticCurveTo(x - 10, 720, x, 700);
  } else {
    ctx.moveTo(x, 680);
    ctx.quadraticCurveTo(x + 30, 720, x + 40, 800);
    ctx.lineTo(x + 20, 800);
    ctx.quadraticCurveTo(x + 10, 720, x, 700);
  }
  ctx.closePath();
  ctx.fill();

  // Arm outline
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, 680);
  ctx.quadraticCurveTo(x + dir * 40, 720, x + dir * 50, 800);
  ctx.quadraticCurveTo(x + dir * 55, 870, x + dir * 45, 920);
  ctx.quadraticCurveTo(x + dir * 40, 940, x + dir * 30, 950);
  ctx.stroke();
}

// ── NECK ──
function drawNeck() {
  ctx.fillStyle = C.skin;
  ctx.fillRect(460, 540, 80, 70);
  ctx.fillStyle = C.skinShadow;
  ctx.fillRect(460, 540, 30, 70);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 2;
  ctx.strokeRect(460, 540, 80, 70);
}

// ── HEAD ──
function drawHead() {
  const isFemale = STATE.gender === 'female';

  // Head shape — anime style (larger, rounder)
  ctx.fillStyle = C.skin;
  ctx.beginPath();
  ctx.ellipse(500, 380, 160, 190, 0, 0, Math.PI * 2);
  ctx.fill();

  // Face shadow (cel-shade — left side)
  ctx.fillStyle = C.skinShadow;
  ctx.beginPath();
  ctx.ellipse(440, 390, 60, 170, -0.15, 0, Math.PI * 2);
  ctx.fill();

  // Jaw definition
  ctx.fillStyle = C.skin;
  ctx.beginPath();
  ctx.moveTo(380, 420);
  ctx.quadraticCurveTo(420, 560, 500, 580);
  ctx.quadraticCurveTo(580, 560, 620, 420);
  ctx.closePath();
  ctx.fill();

  // Ears
  ctx.fillStyle = C.skin;
  ctx.beginPath();
  ctx.ellipse(340, 380, 20, 35, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(660, 380, 20, 35, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Ear shadow
  ctx.fillStyle = C.skinShadow;
  ctx.beginPath();
  ctx.ellipse(340, 385, 12, 25, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(660, 385, 12, 25, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Head outline
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.ellipse(500, 380, 160, 190, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Jaw outline
  ctx.beginPath();
  ctx.moveTo(380, 420);
  ctx.quadraticCurveTo(420, 560, 500, 580);
  ctx.quadraticCurveTo(580, 560, 620, 420);
  ctx.stroke();

  // Ear outlines
  ctx.beginPath();
  ctx.ellipse(340, 380, 20, 35, -0.3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(660, 380, 20, 35, 0.3, 0, Math.PI * 2);
  ctx.stroke();
}

// ── NOSE ──
function drawNose() {
  ctx.strokeStyle = C.outlineLight;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(500, 380);
  ctx.quadraticCurveTo(510, 430, 500, 445);
  ctx.quadraticCurveTo(490, 445, 495, 440);
  ctx.stroke();

  // Nose highlight
  ctx.strokeStyle = C.skinHighlight;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(502, 385);
  ctx.quadraticCurveTo(508, 425, 502, 440);
  ctx.stroke();
}

// ── EYES ──
function drawEyes() {
  const eyeType = STATE.traits.eyes;

  // Eye positions
  const leftEye = { x: 435, y: 370 };
  const rightEye = { x: 565, y: 370 };

  drawSingleEye(leftEye.x, leftEye.y, eyeType, false);
  drawSingleEye(rightEye.x, rightEye.y, eyeType, true);
}

function drawSingleEye(x, y, type, mirror) {
  const m = mirror ? -1 : 1;

  if (type === 'anime') {
    // Large anime eyes
    ctx.fillStyle = C.eyeWhite;
    ctx.beginPath();
    ctx.ellipse(x, y, 35, 42, 0, 0, Math.PI * 2);
    ctx.fill();

    // Iris (large)
    ctx.fillStyle = C.eyeIris;
    ctx.beginPath();
    ctx.ellipse(x + m * 3, y + 5, 25, 32, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pupil
    ctx.fillStyle = C.eyePupil;
    ctx.beginPath();
    ctx.ellipse(x + m * 3, y + 8, 12, 16, 0, 0, Math.PI * 2);
    ctx.fill();

    // Catchlights (anime style — multiple)
    ctx.fillStyle = C.eyeHighlight;
    ctx.beginPath();
    ctx.ellipse(x + m * 12, y - 8, 8, 10, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x - m * 5, y + 12, 4, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Upper lid (bold)
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(x, y, 36, 42, 0, Math.PI, Math.PI * 2);
    ctx.stroke();

    // Lower lash line
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(x, y, 35, 42, 0, 0, Math.PI);
    ctx.stroke();
  } else if (type === 'angry') {
    drawStandardEye(x, y, m, { lidAngle: -0.3, irisY: -3 });
  } else if (type === 'happy') {
    drawHappyEye(x, y, m);
  } else if (type === 'sad') {
    drawStandardEye(x, y, m, { lidAngle: 0.2, irisY: 5 });
  } else if (type === 'cool') {
    drawCoolEye(x, y, m);
  } else if (type === 'shock') {
    drawStandardEye(x, y, m, { size: 1.3, irisY: 0 });
  } else if (type === 'wink') {
    if (mirror) {
      drawHappyEye(x, y, m); // wink
    } else {
      drawStandardEye(x, y, m, {});
    }
  } else {
    drawStandardEye(x, y, m, {});
  }
}

function drawStandardEye(x, y, m, opts = {}) {
  const size = opts.size || 1;
  const lidAngle = opts.lidAngle || 0;
  const irisY = opts.irisY || 0;

  // Eye white
  ctx.fillStyle = C.eyeWhite;
  ctx.beginPath();
  ctx.ellipse(x, y, 28 * size, 22 * size, lidAngle, 0, Math.PI * 2);
  ctx.fill();

  // Iris
  ctx.fillStyle = C.eyeIris;
  ctx.beginPath();
  ctx.ellipse(x + m * 3, y + irisY, 16 * size, 18 * size, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pupil
  ctx.fillStyle = C.eyePupil;
  ctx.beginPath();
  ctx.ellipse(x + m * 3, y + irisY + 2, 8 * size, 10 * size, 0, 0, Math.PI * 2);
  ctx.fill();

  // Catchlight
  ctx.fillStyle = C.eyeHighlight;
  ctx.beginPath();
  ctx.ellipse(x + m * 10, y - 6 + irisY, 5 * size, 6 * size, 0, 0, Math.PI * 2);
  ctx.fill();

  // Outline
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(x, y, 28 * size, 22 * size, lidAngle, 0, Math.PI * 2);
  ctx.stroke();
}

function drawHappyEye(x, y, m) {
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.arc(x, y + 5, 22, Math.PI * 0.1, Math.PI * 0.9);
  ctx.stroke();
}

function drawCoolEye(x, y, m) {
  // Visor-style flat top
  ctx.fillStyle = C.eyeWhite;
  ctx.beginPath();
  ctx.moveTo(x - 30, y - 5);
  ctx.lineTo(x + 30, y - 5);
  ctx.quadraticCurveTo(x + 35, y + 20, x + 25, y + 22);
  ctx.lineTo(x - 25, y + 22);
  ctx.quadraticCurveTo(x - 35, y + 20, x - 30, y - 5);
  ctx.fill();

  ctx.fillStyle = C.eyeIris;
  ctx.beginPath();
  ctx.ellipse(x + m * 2, y + 5, 14, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = C.eyePupil;
  ctx.beginPath();
  ctx.ellipse(x + m * 2, y + 7, 7, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = C.eyeHighlight;
  ctx.beginPath();
  ctx.ellipse(x + m * 8, y - 2, 4, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x - 30, y - 5);
  ctx.lineTo(x + 30, y - 5);
  ctx.quadraticCurveTo(x + 35, y + 20, x + 25, y + 22);
  ctx.lineTo(x - 25, y + 22);
  ctx.quadraticCurveTo(x - 35, y + 20, x - 30, y - 5);
  ctx.stroke();
}

// ── EYEBROWS ──
function drawEyebrows() {
  const type = STATE.traits.eyebrows;
  if (type === 'none') return;

  const left = { x: 435, y: 330 };
  const right = { x: 565, y: 330 };

  ctx.strokeStyle = C.outline;
  ctx.lineCap = 'round';

  if (type === 'default') {
    ctx.lineWidth = 4;
    drawBrow(left.x, left.y, -1, 0);
    drawBrow(right.x, right.y, 1, 0);
  } else if (type === 'angry') {
    ctx.lineWidth = 5;
    drawBrow(left.x, left.y - 5, -1, -0.3);
    drawBrow(right.x, right.y - 5, 1, -0.3);
  } else if (type === 'raised') {
    ctx.lineWidth = 3.5;
    drawBrow(left.x, left.y - 10, -1, 0.15);
    drawBrow(right.x, right.y - 10, 1, 0.15);
  } else if (type === 'thin') {
    ctx.lineWidth = 2;
    drawBrow(left.x, left.y, -1, 0);
    drawBrow(right.x, right.y, 1, 0);
  } else if (type === 'thick') {
    ctx.lineWidth = 7;
    drawBrow(left.x, left.y, -1, 0);
    drawBrow(right.x, right.y, 1, 0);
  }
}

function drawBrow(x, y, dir, angle) {
  ctx.beginPath();
  ctx.moveTo(x - dir * 25, y + angle * 50);
  ctx.quadraticCurveTo(x, y - 8 + angle * 30, x + dir * 25, y + angle * 10);
  ctx.stroke();
}

// ── MOUTH ──
function drawMouth() {
  const type = STATE.traits.mouth;
  const mx = 500, my = 490;

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (type === 'neutral') {
    ctx.strokeStyle = C.outlineLight;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(mx - 20, my);
    ctx.lineTo(mx + 20, my);
    ctx.stroke();
  } else if (type === 'smile') {
    ctx.strokeStyle = C.outlineLight;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(mx - 25, my - 5);
    ctx.quadraticCurveTo(mx, my + 15, mx + 25, my - 5);
    ctx.stroke();
  } else if (type === 'grin') {
    ctx.fillStyle = '#2a0a0a';
    ctx.beginPath();
    ctx.moveTo(mx - 30, my - 5);
    ctx.quadraticCurveTo(mx, my + 25, mx + 30, my - 5);
    ctx.closePath();
    ctx.fill();
    // Teeth
    ctx.fillStyle = '#f8f8f0';
    ctx.fillRect(mx - 25, my - 5, 50, 10);
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(mx - 30, my - 5);
    ctx.quadraticCurveTo(mx, my + 25, mx + 30, my - 5);
    ctx.closePath();
    ctx.stroke();
  } else if (type === 'smirk') {
    ctx.strokeStyle = C.outlineLight;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(mx - 20, my + 3);
    ctx.quadraticCurveTo(mx + 5, my + 5, mx + 25, my - 8);
    ctx.stroke();
  } else if (type === 'open') {
    ctx.fillStyle = '#2a0a0a';
    ctx.beginPath();
    ctx.ellipse(mx, my + 5, 20, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  } else if (type === 'frown') {
    ctx.strokeStyle = C.outlineLight;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(mx - 25, my + 5);
    ctx.quadraticCurveTo(mx, my - 10, mx + 25, my + 5);
    ctx.stroke();
  } else if (type === 'tongue') {
    ctx.strokeStyle = C.outlineLight;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(mx - 20, my);
    ctx.quadraticCurveTo(mx, my + 10, mx + 20, my);
    ctx.stroke();
    // Tongue
    ctx.fillStyle = '#cc4466';
    ctx.beginPath();
    ctx.ellipse(mx + 5, my + 15, 12, 16, 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 2;
    ctx.stroke();
  } else if (type === 'fangs') {
    ctx.fillStyle = '#2a0a0a';
    ctx.beginPath();
    ctx.moveTo(mx - 25, my - 3);
    ctx.quadraticCurveTo(mx, my + 12, mx + 25, my - 3);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(mx - 25, my - 3);
    ctx.quadraticCurveTo(mx, my + 12, mx + 25, my - 3);
    ctx.closePath();
    ctx.stroke();
    // Fangs
    ctx.fillStyle = '#f8f8f0';
    ctx.beginPath();
    ctx.moveTo(mx - 15, my - 3);
    ctx.lineTo(mx - 10, my + 12);
    ctx.lineTo(mx - 5, my - 3);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(mx + 5, my - 3);
    ctx.lineTo(mx + 10, my + 12);
    ctx.lineTo(mx + 15, my - 3);
    ctx.fill();
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mx - 15, my - 3); ctx.lineTo(mx - 10, my + 12); ctx.lineTo(mx - 5, my - 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(mx + 5, my - 3); ctx.lineTo(mx + 10, my + 12); ctx.lineTo(mx + 15, my - 3);
    ctx.stroke();
  }
}

// ── HAIR ──
function drawHair() {
  const type = STATE.traits.hair;
  if (type === 'none') return;

  const isFemale = STATE.gender === 'female';

  // Default hair color
  let hairColor = C.hairBlack;
  let shadowColor = '#0a0a1a';

  ctx.fillStyle = hairColor;
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;

  if (type === 'spiky') {
    drawSpikyHair(hairColor, shadowColor);
  } else if (type === 'short') {
    drawShortHair(hairColor, shadowColor);
  } else if (type === 'fade') {
    drawFadeHair(hairColor, shadowColor);
  } else if (type === 'mohawk') {
    drawMohawkHair(hairColor, shadowColor);
  } else if (type === 'buzz') {
    drawBuzzHair(hairColor, shadowColor);
  } else if (type === 'curly') {
    drawCurlyHair(hairColor, shadowColor, isFemale);
  } else if (type === 'ponytail') {
    drawPonytailHair(hairColor, shadowColor, isFemale);
  } else if (type === 'long') {
    drawLongHair(hairColor, shadowColor, isFemale);
  } else if (type === 'afro') {
    drawAfroHair(hairColor, shadowColor);
  } else if (type === 'bob') {
    drawBobHair(hairColor, shadowColor);
  } else if (type === 'buns') {
    drawBunsHair(hairColor, shadowColor);
  } else if (type === 'braids') {
    drawBraidsHair(hairColor, shadowColor);
  } else if (type === 'pixie') {
    drawPixieHair(hairColor, shadowColor);
  } else if (type === 'wavy') {
    drawWavyHair(hairColor, shadowColor);
  }
}

function drawSpikyHair(color, shadow) {
  ctx.fillStyle = color;
  // Spikes radiating from top of head
  const spikes = [
    [420, 200, 380, 80, 460, 190],
    [460, 180, 440, 50, 500, 170],
    [500, 170, 500, 30, 540, 170],
    [540, 180, 560, 50, 580, 190],
    [580, 200, 620, 80, 600, 210],
    [380, 230, 340, 120, 420, 220],
    [620, 230, 660, 120, 580, 220],
  ];
  spikes.forEach(([x1, y1, cx, cy, x2, y2]) => {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cx, cy, x2, y2);
    ctx.closePath();
    ctx.fill();
  });

  // Hair base covering top of head
  ctx.beginPath();
  ctx.ellipse(500, 300, 165, 120, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Shadow
  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.ellipse(500, 300, 165, 80, 0, Math.PI * 1.1, Math.PI * 1.9);
  ctx.fill();

  // Outline
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  spikes.forEach(([x1, y1, cx, cy, x2, y2]) => {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cx, cy, x2, y2);
    ctx.stroke();
  });
  ctx.beginPath();
  ctx.ellipse(500, 300, 165, 120, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
}

function drawShortHair(color, shadow) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(500, 290, 170, 130, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Side hair
  ctx.fillRect(335, 280, 35, 120);
  ctx.fillRect(630, 280, 35, 120);

  // Shadow
  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.ellipse(500, 290, 170, 90, 0, Math.PI * 1.1, Math.PI * 1.9);
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(500, 290, 170, 130, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
}

function drawFadeHair(color, shadow) {
  // Fade = short on sides, longer on top
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(500, 280, 168, 140, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Top volume
  ctx.beginPath();
  ctx.ellipse(500, 250, 140, 80, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Shadow
  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.ellipse(500, 280, 168, 100, 0, Math.PI * 1.15, Math.PI * 1.85);
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(500, 280, 168, 140, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
}

function drawMohawkHair(color, shadow) {
  ctx.fillStyle = color;
  // Mohawk strip
  ctx.beginPath();
  ctx.moveTo(470, 200);
  ctx.quadraticCurveTo(500, 50, 530, 200);
  ctx.closePath();
  ctx.fill();

  // Base
  ctx.beginPath();
  ctx.ellipse(500, 280, 80, 100, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Shadow
  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.moveTo(480, 200);
  ctx.quadraticCurveTo(500, 80, 520, 200);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(470, 200);
  ctx.quadraticCurveTo(500, 50, 530, 200);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(500, 280, 80, 100, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
}

function drawBuzzHair(color, shadow) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(500, 290, 168, 135, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Texture dots
  ctx.fillStyle = shadow;
  for (let i = 0; i < 40; i++) {
    const angle = Math.PI + Math.random() * Math.PI;
    const r = 100 + Math.random() * 60;
    const x = 500 + Math.cos(angle) * r;
    const y = 290 + Math.sin(angle) * r * 0.8;
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(500, 290, 168, 135, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
}

function drawCurlyHair(color, shadow, isFemale) {
  ctx.fillStyle = color;
  const radius = isFemale ? 180 : 170;
  // Curly puffs
  for (let angle = Math.PI * 0.15; angle < Math.PI * 0.85; angle += 0.2) {
    const x = 500 + Math.cos(angle) * radius;
    const y = 290 + Math.sin(angle) * (radius - 30);
    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI * 2);
    ctx.fill();
  }
  // Base
  ctx.beginPath();
  ctx.ellipse(500, 290, 175, 140, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.ellipse(500, 290, 175, 100, 0, Math.PI * 1.2, Math.PI * 1.8);
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  for (let angle = Math.PI * 0.15; angle < Math.PI * 0.85; angle += 0.2) {
    const x = 500 + Math.cos(angle) * radius;
    const y = 290 + Math.sin(angle) * (radius - 30);
    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawPonytailHair(color, shadow, isFemale) {
  // Top hair
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(500, 285, 170, 135, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Ponytail
  ctx.beginPath();
  ctx.moveTo(500, 200);
  ctx.quadraticCurveTo(600, 250, 620, 400);
  ctx.quadraticCurveTo(630, 500, 600, 550);
  ctx.quadraticCurveTo(580, 500, 590, 400);
  ctx.quadraticCurveTo(580, 280, 500, 230);
  ctx.closePath();
  ctx.fill();

  // Hair tie
  ctx.fillStyle = C.accent;
  ctx.beginPath();
  ctx.ellipse(560, 270, 15, 10, 0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.ellipse(500, 285, 170, 95, 0, Math.PI * 1.15, Math.PI * 1.85);
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(500, 285, 170, 135, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
}

function drawLongHair(color, shadow, isFemale) {
  ctx.fillStyle = color;
  // Top
  ctx.beginPath();
  ctx.ellipse(500, 285, 175, 140, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Side hair (long)
  ctx.beginPath();
  ctx.moveTo(330, 300);
  ctx.quadraticCurveTo(310, 500, 320, 700);
  ctx.quadraticCurveTo(330, 750, 350, 750);
  ctx.quadraticCurveTo(360, 700, 355, 500);
  ctx.quadraticCurveTo(350, 350, 350, 300);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(670, 300);
  ctx.quadraticCurveTo(690, 500, 680, 700);
  ctx.quadraticCurveTo(670, 750, 650, 750);
  ctx.quadraticCurveTo(640, 700, 645, 500);
  ctx.quadraticCurveTo(650, 350, 650, 300);
  ctx.closePath();
  ctx.fill();

  // Shadow
  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.ellipse(500, 285, 175, 100, 0, Math.PI * 1.15, Math.PI * 1.85);
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(500, 285, 175, 140, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
  // Side outlines
  ctx.beginPath();
  ctx.moveTo(330, 300);
  ctx.quadraticCurveTo(310, 500, 320, 700);
  ctx.quadraticCurveTo(330, 750, 350, 750);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(670, 300);
  ctx.quadraticCurveTo(690, 500, 680, 700);
  ctx.quadraticCurveTo(670, 750, 650, 750);
  ctx.stroke();
}

function drawAfroHair(color, shadow) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(500, 280, 200, 0, Math.PI * 2);
  ctx.fill();

  // Texture
  ctx.fillStyle = shadow;
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 80 + Math.random() * 110;
    const x = 500 + Math.cos(angle) * r;
    const y = 280 + Math.sin(angle) * r;
    ctx.beginPath();
    ctx.arc(x, y, 8 + Math.random() * 8, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(500, 280, 200, 0, Math.PI * 2);
  ctx.stroke();
}

function drawBobHair(color, shadow) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(500, 285, 175, 140, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Bob sides (jaw length)
  ctx.beginPath();
  ctx.moveTo(330, 320);
  ctx.quadraticCurveTo(310, 450, 340, 530);
  ctx.quadraticCurveTo(370, 560, 380, 530);
  ctx.quadraticCurveTo(360, 450, 355, 350);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(670, 320);
  ctx.quadraticCurveTo(690, 450, 660, 530);
  ctx.quadraticCurveTo(630, 560, 620, 530);
  ctx.quadraticCurveTo(640, 450, 645, 350);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = shadow;

function drawBraidsHair(color, shadow) {
  ctx.fillStyle = color;
  // Top
  ctx.beginPath();
  ctx.ellipse(500, 285, 170, 130, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Braids (two side braids)
  for (const side of [-1, 1]) {
    const bx = 500 + side * 160;
    for (let y = 320; y < 650; y += 30) {
      ctx.beginPath();
      ctx.ellipse(bx + side * Math.sin(y * 0.05) * 10, y, 18, 18, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 2.5;
  for (const side of [-1, 1]) {
    const bx = 500 + side * 160;
    for (let y = 320; y < 650; y += 30) {
      ctx.beginPath();
      ctx.ellipse(bx + side * Math.sin(y * 0.05) * 10, y, 18, 18, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

function drawPixieHair(color, shadow) {

function drawWavyHair(color, shadow) {
  ctx.fillStyle = color;
  // Wavy side hair
  for (const side of [-1, 1]) {
    ctx.beginPath();
    const sx = 500 + side * 170;
    ctx.moveTo(sx, 280);
    for (let y = 280; y < 650; y += 20) {
      const wave = Math.sin(y * 0.03) * 30 * side;
      ctx.quadraticCurveTo(sx + wave + side * 20, y + 10, sx + wave, y + 20);
    }
    ctx.lineTo(sx + side * 10, 650);
    ctx.lineTo(sx + side * 40, 280);
    ctx.closePath();
    ctx.fill();
  }

  // Top
  ctx.beginPath();
  ctx.ellipse(500, 285, 175, 135, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.ellipse(500, 285, 175, 95, 0, Math.PI * 1.15, Math.PI * 1.85);
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(500, 285, 175, 135, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
}

// ── CLOTHING ──
function drawClothing() {
  const type = STATE.traits.clothing;
  if (type === 'none') return;

  const isFemale = STATE.gender === 'female';

  if (type === 'tshirt') {
    drawTShirt(C.clothBlack);
  } else if (type === 'hoodie') {
    drawHoodie(C.clothGray);
  } else if (type === 'jacket') {
    drawJacket(C.clothBlack);
  } else if (type === 'suit') {
    drawSuit();
  } else if (type === 'tank') {
    drawTankTop(C.clothWhite);
  } else if (type === 'vneck') {
    drawVNeck(C.clothBlue);
  } else if (type === 'seismic_jersey') {
    drawSeismicJersey();
  } else if (type === 'crop') {
    drawCropTop(C.clothRed);
  } else if (type === 'dress') {
    drawDress(C.clothBlue);
  } else if (type === 'blouse') {
    drawBlouse(C.clothWhite);
  }
}

// ── TATTOO ──
function drawTattoo() {
  const type = STATE.traits.tattoo;
  if (type === 'none') return;

  ctx.strokeStyle = 'rgba(0,170,255,0.6)';
  ctx.lineWidth = 2.5;

  if (type === 'lightning') {
    // Lightning bolt on left arm
    ctx.beginPath();
    ctx.moveTo(290, 720);
    ctx.lineTo(310, 760);
    ctx.lineTo(295, 760);
    ctx.lineTo(320, 820);
    ctx.lineTo(300, 780);
    ctx.lineTo(315, 780);
    ctx.closePath();
    ctx.stroke();
  } else if (type === 'tribal') {
    // Tribal pattern on right arm
    ctx.beginPath();
    ctx.moveTo(690, 700);
    ctx.quadraticCurveTo(710, 730, 695, 760);
    ctx.quadraticCurveTo(710, 780, 700, 800);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(695, 720);
    ctx.lineTo(720, 740);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(700, 760);
    ctx.lineTo(725, 770);
    ctx.stroke();
  } else if (type === 'skull') {
    // Small skull on neck
    ctx.fillStyle = 'rgba(0,170,255,0.5)';
    ctx.beginPath();
    ctx.arc(540, 560, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = C.skin;
    ctx.beginPath();
    ctx.arc(536, 557, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(544, 557, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (type === 'snake') {
    // Snake on left arm
    ctx.beginPath();
    ctx.moveTo(280, 700);
    ctx.quadraticCurveTo(260, 740, 280, 770);
    ctx.quadraticCurveTo(300, 800, 280, 830);
    ctx.quadraticCurveTo(260, 850, 270, 870);
    ctx.stroke();
    // Snake head
    ctx.fillStyle = 'rgba(0,170,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(270, 875, 8, 5, -0.3, 0, Math.PI * 2);
    ctx.fill();
  } else if (type === 'wave') {
    // Wave on chest
    ctx.beginPath();
    for (let x = 430; x < 570; x += 3) {
      const y = 680 + Math.sin((x - 430) * 0.08) * 10;
      x === 430 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let x = 440; x < 560; x += 3) {
      const y = 700 + Math.sin((x - 440) * 0.08 + 1) * 8;
      x === 440 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

// ── GLASSES ──
function drawGlasses() {
  const type = STATE.traits.glasses;

  const y = 370;

  if (type === 'round') {

    // Bridge

    // Arms

    ctx.lineTo(340, y - 5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(595, y);
    ctx.lineTo(660, y - 5);

    ctx.strokeStyle = '#888';

    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(408, y - 5);
    ctx.lineTo(340, y - 10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(592, y - 5);
    ctx.lineTo(660, y - 10);
    ctx.stroke();
  } else if (type === 'shades') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    ctx.moveTo(400, y - 18);
    ctx.lineTo(470, y - 18);
    ctx.lineTo(470, y + 18);
    ctx.lineTo(400, y + 22);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(530, y - 18);
    ctx.lineTo(600, y - 18);
    ctx.lineTo(600, y + 22);
    ctx.lineTo(530, y + 18);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = '#555';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(400, y - 18);
    ctx.lineTo(470, y - 18);
    ctx.lineTo(470, y + 18);
    ctx.lineTo(400, y + 22);
    ctx.closePath();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(530, y - 18);
    ctx.lineTo(600, y - 18);
    ctx.lineTo(600, y + 22);
    ctx.lineTo(530, y + 18);
    ctx.closePath();
    ctx.stroke();

    // Bridge
    ctx.beginPath();
    ctx.moveTo(470, y - 10);
    ctx.lineTo(530, y - 10);
    ctx.stroke();

    // Reflection
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(410, y - 10);
    ctx.lineTo(430, y + 5);
    ctx.stroke();
  } else if (type === 'visor') {
    ctx.fillStyle = 'rgba(0,170,255,0.3)';
    ctx.beginPath();
    ctx.moveTo(340, y - 15);
    ctx.lineTo(660, y - 15);
    ctx.quadraticCurveTo(680, y, 660, y + 15);
    ctx.lineTo(340, y + 15);
    ctx.quadraticCurveTo(320, y, 340, y - 15);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = C.accent;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(340, y - 15);
    ctx.lineTo(660, y - 15);
    ctx.quadraticCurveTo(680, y, 660, y + 15);
    ctx.lineTo(340, y + 15);
    ctx.quadraticCurveTo(320, y, 340, y - 15);
    ctx.closePath();
    ctx.stroke();
  } else if (type === 'monocle') {
    ctx.strokeStyle = '#cc9900';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(565, y, 28, 0, Math.PI * 2);
    ctx.stroke();
    // Chain
    ctx.strokeStyle = '#cc9900';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(565, y + 28);
    ctx.quadraticCurveTo(580, y + 100, 560, y + 200);
    ctx.stroke();
  }
}

// ── HAT ──
function drawHat() {
  const type = STATE.traits.hat;
  if (type === 'none') return;

  if (type === 'cap') {
    drawCap('#1a1a2e');
  } else if (type === 'beanie') {
    drawBeanie('#2a2a3a');
  } else if (type === 'hood') {
    // Already drawn in hoodie, skip if clothing is hoodie
    if (STATE.traits.clothing !== 'hoodie') {
      drawHoodOnly('#3a3a4a');
    }
  } else if (type === 'crown') {
    drawCrown();
  } else if (type === 'helmet') {
    drawHelmet();
  } else if (type === 'headband') {
    drawHeadband(C.accent);
  } else if (type === 'seismic_cap') {
    drawSeismicCap();
  } else if (type === 'bow') {
    drawBow();
  } else if (type === 'flower') {
    drawFlower();
  }
}

function drawCap(color) {
  ctx.fillStyle = color;
  // Cap dome
  ctx.beginPath();
  ctx.ellipse(500, 260, 160, 80, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // Brim
  ctx.beginPath();
  ctx.moveTo(340, 260);
  ctx.quadraticCurveTo(300, 260, 280, 280);
  ctx.quadraticCurveTo(300, 300, 340, 290);
  ctx.lineTo(660, 290);
  ctx.quadraticCurveTo(700, 300, 720, 280);
  ctx.quadraticCurveTo(700, 260, 660, 260);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(500, 260, 160, 80, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(340, 260);
  ctx.quadraticCurveTo(300, 260, 280, 280);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(660, 260);
  ctx.quadraticCurveTo(700, 260, 720, 280);
  ctx.stroke();
}

function drawBeanie(color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(500, 250, 170, 100, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Fold
  ctx.fillStyle = C.outlineLight;
  ctx.fillRect(335, 250, 330, 20);

  // Pom pom
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(500, 160, 25, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(500, 250, 170, 100, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
}

function drawHoodOnly(color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(370, 280);
  ctx.quadraticCurveTo(500, 180, 630, 280);
  ctx.quadraticCurveTo(650, 250, 630, 220);
  ctx.quadraticCurveTo(500, 130, 370, 220);
  ctx.quadraticCurveTo(350, 250, 370, 280);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.stroke();
}

function drawCrown() {
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  ctx.moveTo(370, 260);
  ctx.lineTo(380, 180);
  ctx.lineTo(430, 220);
  ctx.lineTo(470, 160);
  ctx.lineTo(500, 200);
  ctx.lineTo(530, 160);
  ctx.lineTo(570, 220);
  ctx.lineTo(620, 180);
  ctx.lineTo(630, 260);
  ctx.closePath();
  ctx.fill();

  // Gems
  ctx.fillStyle = '#ff3355';
  ctx.beginPath();
  ctx.arc(500, 220, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#00aaff';
  ctx.beginPath();
  ctx.arc(430, 230, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(570, 230, 7, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#cc8800';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(370, 260);
  ctx.lineTo(380, 180);
  ctx.lineTo(430, 220);
  ctx.lineTo(470, 160);
  ctx.lineTo(500, 200);
  ctx.lineTo(530, 160);
  ctx.lineTo(570, 220);
  ctx.lineTo(620, 180);
  ctx.lineTo(630, 260);
  ctx.closePath();
  ctx.stroke();
}

function drawHelmet() {
  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.ellipse(500, 280, 175, 150, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Visor slit
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(380, 350);
  ctx.lineTo(620, 350);
  ctx.quadraticCurveTo(630, 370, 620, 380);
  ctx.lineTo(380, 380);
  ctx.quadraticCurveTo(370, 370, 380, 350);
  ctx.closePath();
  ctx.fill();

  // Visor glow
  ctx.fillStyle = 'rgba(0,170,255,0.3)';
  ctx.beginPath();
  ctx.moveTo(390, 355);
  ctx.lineTo(610, 355);
  ctx.quadraticCurveTo(615, 365, 610, 375);
  ctx.lineTo(390, 375);
  ctx.quadraticCurveTo(385, 365, 390, 355);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(500, 280, 175, 150, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
}

function drawHeadband(color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(335, 290);
  ctx.quadraticCurveTo(500, 270, 665, 290);
  ctx.quadraticCurveTo(665, 310, 665, 310);
  ctx.quadraticCurveTo(500, 290, 335, 310);
  ctx.closePath();
  ctx.fill();

  // Knot on side
  ctx.beginPath();
  ctx.moveTo(335, 295);
  ctx.quadraticCurveTo(310, 280, 300, 300);
  ctx.quadraticCurveTo(310, 320, 335, 305);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(335, 290);
  ctx.quadraticCurveTo(500, 270, 665, 290);
  ctx.stroke();
}

function drawSeismicCap() {
  drawCap('#0a1a2e');
  // Seismic logo on front
  ctx.fillStyle = C.accent;
  ctx.font = 'bold 60px Outfit';
  ctx.textAlign = 'center';
  ctx.fillText('⚡', 500, 275);
}

function drawBow() {
  ctx.fillStyle = '#ff6688';
  // Left loop
  ctx.beginPath();
  ctx.ellipse(580, 210, 35, 25, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // Right loop
  ctx.beginPath();
  ctx.ellipse(620, 200, 35, 25, 0.3, 0, Math.PI * 2);
  ctx.fill();
  // Center knot
  ctx.fillStyle = '#cc4466';
  ctx.beginPath();
  ctx.arc(600, 210, 12, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(580, 210, 35, 25, -0.3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(620, 200, 35, 25, 0.3, 0, Math.PI * 2);
  ctx.stroke();
}

function drawFlower() {
  const fx = 620, fy = 220;
  // Petals
  ctx.fillStyle = '#ff88aa';
  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.ellipse(fx + Math.cos(angle) * 18, fy + Math.sin(angle) * 18, 14, 10, angle, 0, Math.PI * 2);
    ctx.fill();
  }
  // Center
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.arc(fx, fy, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.ellipse(fx + Math.cos(angle) * 18, fy + Math.sin(angle) * 18, 14, 10, angle, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ── ACCESSORIES ──
function drawAccessories() {
  const type = STATE.traits.accessories;
  if (type === 'none') return;

  if (type === 'chain') {
    // Gold chain necklace
    ctx.strokeStyle = '#ccaa00';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let x = 430; x < 570; x += 5) {
      const y = 595 + Math.sin((x - 430) * 0.08) * 8;
      x === 430 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    // Pendant
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.moveTo(500, 610);
    ctx.lineTo(490, 630);
    ctx.lineTo(510, 630);
    ctx.closePath();
    ctx.fill();
  } else if (type === 'earring') {
    // Left earring
    ctx.fillStyle = '#00aaff';
    ctx.beginPath();
    ctx.arc(338, 410, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Right earring
    ctx.beginPath();
    ctx.arc(662, 410, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  } else if (type === 'watch') {
    // Watch on left wrist
    ctx.fillStyle = '#333';
    ctx.fillRect(265, 870, 40, 20);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(270, 873, 30, 14);
    // Watch face
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(285, 880, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else if (type === 'bandana') {
    ctx.fillStyle = '#aa2020';
    ctx.beginPath();
    ctx.moveTo(335, 290);
    ctx.quadraticCurveTo(500, 275, 665, 290);
    ctx.quadraticCurveTo(665, 305, 665, 305);
    ctx.quadraticCurveTo(500, 290, 335, 305);
    ctx.closePath();
    ctx.fill();

    // Knot
    ctx.beginPath();
    ctx.moveTo(335, 295);
    ctx.quadraticCurveTo(310, 280, 295, 310);
    ctx.quadraticCurveTo(310, 330, 335, 305);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(335, 290);
    ctx.quadraticCurveTo(500, 275, 665, 290);
    ctx.stroke();
  } else if (type === 'scar') {
    // Scar across face
    ctx.strokeStyle = '#cc6666';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(410, 330);
    ctx.lineTo(550, 500);
    ctx.stroke();
    // Cross marks
    ctx.beginPath();
    ctx.moveTo(450, 380);
    ctx.lineTo(465, 395);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(490, 430);
    ctx.lineTo(505, 445);
    ctx.stroke();
  }
}

// ── WEAPON ──
function drawWeapon() {
  const type = STATE.traits.weapon;
  if (type === 'none') return;

  if (type === 'sword') {
    // Sword in right hand
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.moveTo(740, 850);
    ctx.lineTo(750, 600);
    ctx.lineTo(760, 850);
    ctx.closePath();
    ctx.fill();
    // Guard
    ctx.fillStyle = '#ccaa00';
    ctx.fillRect(730, 850, 40, 10);
    // Handle
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(745, 860, 10, 50);
    // Pommel
    ctx.fillStyle = '#ccaa00';
    ctx.beginPath();
    ctx.arc(750, 915, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(740, 850);
    ctx.lineTo(750, 600);
    ctx.lineTo(760, 850);
    ctx.closePath();
    ctx.stroke();
  } else if (type === 'axe') {
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(748, 750, 8, 180);
    // Axe head
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.moveTo(756, 760);
    ctx.quadraticCurveTo(800, 780, 790, 820);
    ctx.quadraticCurveTo(770, 830, 756, 810);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 2;
    ctx.stroke();
  } else if (type === 'staff') {
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(748, 600, 8, 330);
    // Crystal top
    ctx.fillStyle = C.accent;
    ctx.beginPath();
    ctx.moveTo(752, 600);
    ctx.lineTo(740, 560);
    ctx.lineTo(752, 540);
    ctx.lineTo(764, 560);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 2;
    ctx.stroke();
  } else if (type === 'gun') {
    ctx.fillStyle = '#333';
    ctx.fillRect(720, 860, 60, 20);
    ctx.fillRect(740, 840, 20, 20);
    // Barrel
    ctx.fillRect(770, 865, 40, 10);
    ctx.strokeStyle = C.outline;
    ctx.lineWidth = 2;
    ctx.strokeRect(720, 860, 60, 20);
  } else if (type === 'shield') {
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.moveTo(260, 700);
    ctx.quadraticCurveTo(240, 800, 260, 900);
    ctx.quadraticCurveTo(290, 920, 320, 900);
    ctx.quadraticCurveTo(340, 800, 320, 700);
    ctx.quadraticCurveTo(290, 680, 260, 700);
    ctx.closePath();
    ctx.fill();
    // Shield emblem
    ctx.fillStyle = C.accent;
    ctx.beginPath();
    ctx.arc(290, 800, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(260, 700);
    ctx.quadraticCurveTo(240, 800, 260, 900);
    ctx.quadraticCurveTo(290, 920, 320, 900);
    ctx.quadraticCurveTo(340, 800, 320, 700);
    ctx.quadraticCurveTo(290, 680, 260, 700);
    ctx.closePath();
    ctx.stroke();
  }
}

// ── EFFECTS ──
function drawEffects() {
  // Subtle ambient glow on character
  ctx.fillStyle = 'rgba(0,170,255,0.03)';
  ctx.beginPath();
  ctx.ellipse(500, 500, 300, 400, 0, 0, Math.PI * 2);
  ctx.fill();
}

// ═══════════════════════════════════════════════════
// UI — Build controls from CATEGORIES
// ═══════════════════════════════════════════════════
function buildUI() {
  const container = document.getElementById('categories');
  container.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'category';
    div.innerHTML = `
      <div class="category-header" onclick="this.classList.toggle('open');this.nextElementSibling.style.display=this.classList.contains('open')?'block':'none'">
        <h3>${cat.icon} ${cat.name}</h3>
        <span class="arrow">▼</span>
      </div>
      <div class="trait-grid" style="display:none"></div>
    `;
    const grid = div.querySelector('.trait-grid');

    const traits = (cat.gendered && STATE.gender === 'female' && cat.female) ? cat.female : cat.traits;

    traits.forEach(trait => {
      const btn = document.createElement('button');
      btn.className = `trait-btn ${trait.id === 'none' ? 'none' : ''} ${STATE.traits[cat.id] === trait.id ? 'active' : ''}`;
      btn.innerHTML = `${trait.emoji}<span class="label">${trait.label}</span>`;
      btn.onclick = () => {
        STATE.traits[cat.id] = trait.id;
        // Update active state
        grid.querySelectorAll('.trait-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      };
      grid.appendChild(btn);
    });

    container.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════
// GENDER SWITCH
// ═══════════════════════════════════════════════════
function setGender(g) {
  STATE.gender = g;
  document.querySelectorAll('.gender-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.gender === g);
  });
  // Reset gendered traits if not available
  CATEGORIES.forEach(cat => {
    if (cat.gendered) {
      const traits = (g === 'female' && cat.female) ? cat.female : cat.traits;
      const current = STATE.traits[cat.id];
      if (!traits.find(t => t.id === current)) {
        STATE.traits[cat.id] = 'none';
      }
    }
  });
  buildUI();
  render();
}

// ═══════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════
function downloadPFP() {
  const link = document.createElement('a');
  link.download = 'seismic-pfp.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function randomize() {
  CATEGORIES.forEach(cat => {
    const traits = (cat.gendered && STATE.gender === 'female' && cat.female) ? cat.female : cat.traits;
    const idx = Math.floor(Math.random() * traits.length);
    STATE.traits[cat.id] = traits[idx].id;
  });
  buildUI();
  render();
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildUI();
render();
</script>
