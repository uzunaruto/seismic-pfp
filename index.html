<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seismic PFP Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060504;--bg2:#0c0a08;--bg3:#13100d;--bg4:#1a1612;--text:#f5f0e8;--text2:#8a7d6d;--text3:#5a5048;--text4:#3a3430;--accent:#C19200;--accent2:#ffd866;--accent3:#A87504;--glass:rgba(12,10,8,.85);--glass2:rgba(20,16,12,.9);--border:rgba(193,146,0,.12);--border2:rgba(245,240,232,.06);--radius:16px;--radius-sm:10px;--radius-xs:8px}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(193,146,0,.06) 0%,transparent 70%);top:-200px;left:-150px;animation:drift 25s infinite ease-in-out}
.bg-orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(6,147,205,.04) 0%,transparent 70%);bottom:-150px;right:-100px;animation:drift 30s infinite ease-in-out reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-30px)}66%{transform:translate(-30px,40px)}}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(193,146,0,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(193,146,0,.02) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,black 30%,transparent 100%)}
.nav{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 20px;width:min(95%,1200px);background:var(--glass2);backdrop-filter:blur(40px) saturate(1.5);border:1px solid var(--border);border-radius:60px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.nav-logo{width:32px;height:32px;border-radius:50%;object-fit:contain}
.nav-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app{max-width:1200px;margin:0 auto;padding:72px 20px 60px;position:relative;z-index:1}
.layout{display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start}
.preview-col{position:sticky;top:80px;display:flex;flex-direction:column;align-items:center;gap:16px}
.preview-wrap{position:relative}
.preview-glow{position:absolute;inset:-16px;border-radius:50%;z-index:0;background:radial-gradient(circle,rgba(193,146,0,.08) 0%,transparent 70%);animation:glow-breathe 4s ease-in-out infinite}
@keyframes glow-breathe{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
.preview-frame{position:relative;z-index:1;width:320px;height:320px;border-radius:50%;overflow:hidden;border:3px solid rgba(193,146,0,.2);box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 30px rgba(193,146,0,.06)}
.preview-frame canvas{width:100%;height:100%;display:block}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s;background:var(--glass);color:var(--text2);letter-spacing:.3px}
.btn:hover{transform:translateY(-2px);border-color:var(--border);color:var(--text);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;border-color:transparent;font-weight:700}
.btn-primary:hover{box-shadow:0 10px 28px rgba(193,146,0,.35);transform:translateY(-3px)}
.controls-col{display:flex;flex-direction:column;gap:14px}
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:12px 14px;background:var(--glass);border:1px solid var(--border2);border-radius:var(--radius)}
.cat-tab{padding:7px 12px;border-radius:var(--radius-xs);border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px;white-space:nowrap}
.cat-tab:hover{border-color:var(--border);color:var(--text2)}
.cat-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(193,146,0,.08);box-shadow:0 0 10px rgba(193,146,0,.1)}
.trait-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:4px}
.trait-btn{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:var(--bg3);border:2px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;padding:4px}
.trait-btn:hover{border-color:var(--border);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.3)}
.trait-btn.active{border-color:var(--accent);box-shadow:0 0 16px rgba(193,146,0,.15),0 0 0 1px rgba(193,146,0,.2) inset}
.trait-btn .preview{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.trait-btn .preview canvas{width:100%;height:100%;border-radius:calc(var(--radius-sm) - 4px)}
.trait-btn .label{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:8px;font-weight:700;color:var(--text);background:rgba(0,0,0,.6);padding:2px 4px;backdrop-filter:blur(4px);letter-spacing:.5px;text-transform:uppercase}
.trait-btn .check{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:900;z-index:2}
.trait-btn.active .check{display:flex}
.trait-btn.none-btn{background:var(--bg4);border-style:dashed}
.trait-btn.none-btn::after{content:'✕';font-size:20px;color:var(--text3)}
.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title h3{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.section-title .count{font-size:11px;color:var(--text3)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);padding:10px 20px;background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius-sm);backdrop-filter:blur(30px);font-size:12px;font-weight:600;color:var(--text);z-index:200;transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 10px 30px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.footer{position:relative;z-index:1;text-align:center;padding:24px;border-top:1px solid var(--border2);margin-top:40px}
.footer p{font-size:11px;color:var(--text3)}
.footer a{color:var(--accent);text-decoration:none;font-weight:600}
@media(max-width:900px){.layout{grid-template-columns:1fr;gap:20px}.preview-col{position:static}.preview-frame{width:280px;height:280px}.nav{top:8px;padding:8px 14px;width:97%}.trait-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.preview-frame{width:240px;height:240px}.trait-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="bg-fx"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
<div class="bg-grid"></div>
<nav class="nav">
  <a href="https://discord.gg/seismic" class="nav-brand"><img src="https://pfp.seismic.website/logo.svg" alt="" class="nav-logo" onerror="this.style.display='none'"><span class="nav-title">SEISMIC PFP</span></a>
</nav>
<div class="app">
  <div class="layout">
    <div class="preview-col">
      <div class="preview-wrap"><div class="preview-glow"></div><div class="preview-frame"><canvas id="C" width="800" height="800"></canvas></div></div>
      <div class="actions">
        <button class="btn btn-primary" onclick="dl()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</button>
        <button class="btn" onclick="rnd()"><svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>Randomize</button>
        <button class="btn" onclick="rst()"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Reset</button>
      </div>
    </div>
    <div class="controls-col">
      <div class="cat-tabs" id="tabs"></div>
      <div><div class="section-title"><h3 id="cTitle">🎨 Background</h3><span class="count" id="cCount"></span></div><div class="trait-grid" id="grid"></div></div>
    </div>
  </div>
</div>
<footer class="footer"><p>Built for <a href="https://discord.gg/seismic">Seismic</a></p></footer>
<div class="toast" id="toast"></div>

<script>
// ═══ CONSTANTS ═══
var S=800, HX=400, HY=260, HR=155;
var SK='#e8c4a0', SK2='#d4a882', SK3='#c49470', SK4='#f0d4b8', SK5='#b08060';

// ═══ CATEGORIES ═══
var CATS=[
  {k:'Bg',i:'🎨',l:'Background'},{k:'Hair',i:'💇',l:'Hair'},{k:'Eyes',i:'👀',l:'Eyes'},
  {k:'Mouth',i:'👄',l:'Mouth'},{k:'Beard',i:'🧔',l:'Beard'},{k:'Glasses',i:'🕶️',l:'Glasses'},
  {k:'Hat',i:'🎩',l:'Hat'},{k:'Cloth',i:'👕',l:'Clothes'},{k:'Tattoo',i:'✒️',l:'Tattoo'},
  {k:'Acc',i:'💎',l:'Accessory'},
];
var cur='Bg', st={};
var INIT={Bg:'obsidian',Hair:'none',Eyes:'normal',Mouth:'smile',Beard:'none',Glasses:'none',Hat:'none',Cloth:'tshirt',Tattoo:'none',Acc:'none'};

// ═══ HELPERS ═══
function grad(c,x,y,r,c1,c2){var g=c.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,c1);g.addColorStop(1,c2);return g}
function lgrad(c,x1,y1,x2,y2,c1,c2){var g=c.createLinearGradient(x1,y1,x2,y2);g.addColorStop(0,c1);g.addColorStop(1,c2);return g}
function oval(c,x,y,rx,ry,a1,a2){c.beginPath();c.ellipse(x,y,rx,ry,a1||0,a2||0,Math.PI*2)}
function circle(c,x,y,r){c.beginPath();c.arc(x,y,r,0,Math.PI*2)}
function rrect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y)}
function star5(c,cx,cy,or,ir,fill){c.fillStyle=fill;c.beginPath();for(var i=0;i<10;i++){var r=i%2?ir:or,a=-Math.PI/2+i*Math.PI/5;c[i===0?'moveTo':'lineTo'](cx+Math.cos(a)*r,cy+Math.sin(a)*r)}c.closePath();c.fill()}

// ═══ DRAW FUNCTIONS ═══
var D={
  // ─── BACKGROUNDS ───
  bg_obsidian:function(c){var g=lgrad(c,0,0,S,S,'#14121a','#0a090e');c.fillStyle=g;c.fillRect(0,0,S,S);c.fillStyle='rgba(193,146,0,.02)';for(var i=0;i<5;i++){c.beginPath();c.arc(200+i*100,150+i*80,80+i*40,0,Math.PI*2);c.fill()}},
  bg_copper:function(c){c.fillStyle=grad(c,S/2,S/2,S*0.7,'#2a1a08','#080402');c.fillRect(0,0,S,S)},
  bg_midnight:function(c){c.fillStyle=lgrad(c,0,0,S,S,'#0e0e3a','#0a0a1e');c.fillRect(0,0,S,S);c.fillStyle='rgba(100,100,255,.03)';for(var i=0;i<4;i++){c.beginPath();c.arc(100+i*200,100+Math.sin(i)*100,60+i*20,0,Math.PI*2);c.fill()}},
  bg_forest:function(c){c.fillStyle=grad(c,S/2,S/2,S*0.7,'#0e1e0e','#040a04');c.fillRect(0,0,S,S)},
  bg_crimson:function(c){c.fillStyle=grad(c,S/2,S/2,S*0.7,'#200808','#080202');c.fillRect(0,0,S,S)},
  bg_ocean:function(c){c.fillStyle=lgrad(c,0,0,0,S,'#081828','#0a1a3a');c.fillRect(0,0,S,S)},
  bg_gold:function(c){c.fillStyle=grad(c,S/2,S/2,S*0.7,'#2a2008','#0a0800');c.fillRect(0,0,S,S)},
  bg_cyber:function(c){c.fillStyle=lgrad(c,0,0,S,S,'#080a1a','#0a0818');c.fillRect(0,0,S,S);c.strokeStyle='rgba(0,255,200,.03)';c.lineWidth=1;for(var i=0;i<S;i+=40){c.beginPath();c.moveTo(i,0);c.lineTo(i,S);c.stroke();c.beginPath();c.moveTo(0,i);c.lineTo(S,i);c.stroke()}},

  // ─── BODY & HEAD (drawn once in render) ───
  body:function(c){
    // Neck shadow
    c.fillStyle=SK3;oval(c,HX,HY+HR*0.88,30,18);c.fill();
    // Neck
    c.fillStyle=SK;var ny=HY+HR*0.82;c.fillRect(HX-28,ny,56,HY+HR*1.15-ny);
    // Shoulders & body
    c.fillStyle=SK3;c.beginPath();
    c.moveTo(HX-HR*1.1,HY+HR*1.05);
    c.quadraticCurveTo(HX-HR*1.3,HY+HR*1.25,HX-HR*1.2,HY+HR*1.65);
    c.lineTo(HX-HR*1.15,S*0.92);c.lineTo(HX+HR*1.15,S*0.92);
    c.lineTo(HX+HR*1.2,HY+HR*1.65);
    c.quadraticCurveTo(HX+HR*1.3,HY+HR*1.25,HX+HR*1.1,HY+HR*1.05);c.closePath();c.fill();
    // Shoulder highlight
    c.fillStyle='rgba(240,212,184,.15)';c.beginPath();
    c.moveTo(HX-HR*1.05,HY+HR*1.07);
    c.quadraticCurveTo(HX-HR*0.8,HY+HR*1.02,HX-HR*0.4,HY+HR*1.07);
    c.lineTo(HX-HR*0.4,HY+HR*1.2);c.quadraticCurveTo(HX-HR*0.8,HY+HR*1.15,HX-HR*1.05,HY+HR*1.18);c.fill();
    c.fillStyle='rgba(240,212,184,.15)';c.beginPath();
    c.moveTo(HX+HR*1.05,HY+HR*1.07);
    c.quadraticCurveTo(HX+HR*0.8,HY+HR*1.02,HX+HR*0.4,HY+HR*1.07);
    c.lineTo(HX+HR*0.4,HY+HR*1.2);c.quadraticCurveTo(HX+HR*0.8,HY+HR*1.15,HX+HR*1.05,HY+HR*1.18);c.fill();
  },
  head:function(c){
    // Ears
    c.fillStyle=SK;oval(c,HX-HR*0.95,HY+8,18,26);c.fill();
    oval(c,HX+HR*0.95,HY+8,18,26);c.fill();
    c.fillStyle=SK2;oval(c,HX-HR*0.95,HY+8,9,14);c.fill();
    oval(c,HX+HR*0.95,HY+8,9,14);c.fill();
    // Head base
    c.fillStyle=SK;circle(c,HX,HY,HR);c.fill();
    // Face gradient (dimension)
    c.fillStyle=grad(c,HX-30,HY-40,HR*1.1,'rgba(240,212,184,.25)','rgba(200,160,120,.05)');circle(c,HX,HY,HR);c.fill();
    // Jaw shadow
    c.fillStyle='rgba(176,128,96,.2)';c.beginPath();
    c.moveTo(HX-HR*0.7,HY+HR*0.5);
    c.quadraticCurveTo(HX,HY+HR*1.15,HX+HR*0.7,HY+HR*0.5);
    c.quadraticCurveTo(HX,HY+HR*1.0,HX-HR*0.7,HY+HR*0.5);c.fill();
    // Nose
    c.fillStyle=SK2;c.beginPath();
    c.moveTo(HX-3,HY+10);c.quadraticCurveTo(HX-12,HY+35,HX-6,HY+40);
    c.quadraticCurveTo(HX,HY+44,HX+6,HY+40);
    c.quadraticCurveTo(HX+12,HY+35,HX+3,HY+10);c.fill();
    c.fillStyle=SK4;c.beginPath();c.ellipse(HX-5,HY+38,4,3,0.2,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(HX+5,HY+38,4,3,-0.2,0,Math.PI*2);c.fill();
    // Eyebrows
    c.strokeStyle=SK5;c.lineWidth=4.5;c.lineCap='round';
    c.beginPath();c.moveTo(HX-52,HY-38);c.quadraticCurveTo(HX-32,HY-50,HX-12,HY-38);c.stroke();
    c.beginPath();c.moveTo(HX+52,HY-38);c.quadraticCurveTo(HX+32,HY-50,HX+12,HY-38);c.stroke();
    // Default smile
    c.strokeStyle=SK3;c.lineWidth=3.5;c.lineCap='round';
    c.beginPath();c.arc(HX,HY+62,20,0.15,Math.PI-0.15);c.stroke();
  },

  // ─── EYES ───
  eyes_normal:function(c){
    [[-32,0],[32,0]].forEach(function(p){
      var x=HX+p[0],y=HY-8;
      // White
      c.fillStyle='#fff';oval(c,x,y,26,20);c.fill();
      // Shadow
      c.fillStyle='rgba(0,0,0,.06)';oval(c,x,y+4,24,16);c.fill();
      // Iris
      c.fillStyle='#3a2010';circle(c,x+4,y+2,12);c.fill();
      // Pupil
      c.fillStyle='#0a0604';circle(c,x+4,y+2,6);c.fill();
      // Highlights
      c.fillStyle='#fff';circle(c,x+9,y-4,5);c.fill();
      circle(c,x+1,y+6,2.5);c.fill();
      // Upper lid line
      c.strokeStyle='rgba(80,50,30,.4)';c.lineWidth=2;c.beginPath();c.arc(x,y,24,-0.4,Math.PI+0.4);c.stroke();
    });
  },
  eyes_anime:function(c){
    [[-32,0],[32,0]].forEach(function(p){
      var x=HX+p[0],y=HY-8;
      c.fillStyle='#fff';oval(c,x,y,30,26);c.fill();
      c.fillStyle='#2a1008';oval(c,x+3,y+2,18,20);c.fill();
      c.fillStyle='#1a0804';oval(c,x+3,y+2,10,12);c.fill();
      c.fillStyle='#fff';circle(c,x+10,y-6,6);c.fill();
      circle(c,x-2,y+8,3);c.fill();
      // Sparkle
      c.fillStyle='rgba(255,255,255,.3)';circle(c,x+14,y-10,2);c.fill();
    });
  },
  eyes_angry:function(c){
    [[-32,0],[32,0]].forEach(function(p,i){
      var x=HX+p[0],y=HY-8;
      c.fillStyle='#fff';oval(c,x,y+2,24,16);c.fill();
      c.fillStyle='#3a2010';circle(c,x+3,y+4,10);c.fill();
      c.fillStyle='#0a0604';circle(c,x+3,y+4,5);c.fill();
      c.fillStyle='#fff';circle(c,x+7,y,3.5);c.fill();
      // Angry brow
      c.fillStyle=SK5;c.beginPath();
      if(i===0){c.moveTo(x-22,y-20);c.lineTo(x+22,y-14);c.lineTo(x+22,y-8);c.lineTo(x-22,y-14)}
      else{c.moveTo(x+22,y-20);c.lineTo(x-22,y-14);c.lineTo(x-22,y-8);c.lineTo(x+22,y-14)}
      c.fill();
    });
  },
  eyes_happy:function(c){
    [[-32,0],[32,0]].forEach(function(p){
      var x=HX+p[0],y=HY-8;
      c.strokeStyle=SK5;c.lineWidth=4;c.lineCap='round';
      c.beginPath();c.arc(x,y-4,18,0.2,Math.PI-0.2);c.stroke();
    });
  },
  eyes_star:function(c){[-32,32].forEach(function(dx){star5(c,HX+dx,HY-8,22,10,'#C19200')})},
  eyes_heart:function(c){
    [[-32,0],[32,0]].forEach(function(p){
      var x=HX+p[0],y=HY-8;
      c.fillStyle='#e03050';c.beginPath();c.moveTo(x,y+16);
      c.bezierCurveTo(x-24,y-6,x-14,y-24,x,y-10);
      c.bezierCurveTo(x+14,y-24,x+24,y-6,x,y+16);c.fill();
      c.fillStyle='rgba(255,255,255,.3)';circle(c,x-6,y-6,4);c.fill();
    });
  },
  eyes_robot:function(c){

// ═══ RENDER ═══
function render(){
  var cv=document.getElementById('C'), c=cv.getContext('2d');
  cv.width=S;cv.height=S;c.clearRect(0,0,S,S);
  c.save();c.beginPath();c.arc(S/2,S/2,S/2,0,Math.PI*2);c.clip();

  // Background
  var bg=st.Bg, bfn='bg_'+bg;
  if(D[bfn])D[bfn](c);

  // Base
  D.body(c);
  D.head(c);

  // Traits in layer order
  var order=['Tattoo','Cloth','Beard','Mouth','Eyes','Glasses','Hair','Hat','Acc'];
  order.forEach(function(cat){
    var id=st[cat];if(!id||id==='none')return;
    var fn=cat.toLowerCase()+'_'+id;
    if(D[fn])D[fn](c);
  });

  c.restore();
}

// ═══ UI ═══
function buildGrid(){
  var grid=document.getElementById('grid'), items=ITEMS[cur], cat=CATS.find(function(c){return c.k===cur});
  document.getElementById('cTitle').textContent=cat.i+' '+cat.l;
  var sel=0;for(var k in st)if(st[k]&&st[k]!=='none')sel++;
  document.getElementById('cCount').textContent=sel+' trait(s)';
  grid.innerHTML='';
  items.forEach(function(item){
    var btn=document.createElement('button');
    btn.className='trait-btn'+(st[cur]===item.id?' active':'');
    if(item.id==='none')btn.classList.add('none-btn');
    var pv=document.createElement('div');pv.className='preview';
    var tc=document.createElement('canvas');tc.width=120;tc.height=120;
    var tx=tc.getContext('2d');
    tx.save();tx.beginPath();tx.arc(60,60,60,0,Math.PI*2);tx.clip();
    if(cur==='Bg'){
      var bfn='bg_'+item.id;if(D[bfn])D[bfn](tx);
      tx.save();tx.translate(-S/2+60,-S/2+60);tx.scale(120/S,120/S);D.body(tx);D.head(tx);tx.restore();
    } else {
      tx.fillStyle='#13100d';tx.fillRect(0,0,120,120);
      tx.save();tx.translate(-S/2+60,-S/2+60);tx.scale(120/S,120/S);
      D.body(tx);D.head(tx);
      if(item.id!=='none'){var fn=cur.toLowerCase()+'_'+item.id;if(D[fn])D[fn](tx)}
      tx.restore();
    }
    tx.restore();
    pv.appendChild(tc);btn.appendChild(pv);
    var ck=document.createElement('span');ck.className='check';ck.textContent='✓';btn.appendChild(ck);
    var lb=document.createElement('span');lb.className='label';lb.textContent=item.l;btn.appendChild(lb);
    btn.onclick=function(){st[cur]=item.id;buildGrid();render()};
    grid.appendChild(btn);
  });
}

function switchCat(k){
  cur=k;
  document.querySelectorAll('.cat-tab').forEach(function(t,i){t.classList.toggle('active',CATS[i].k===k)});
  buildGrid();
}

function rnd(){CATS.forEach(function(cat){var items=ITEMS[cat.k];st[cat.k]=items[Math.floor(Math.random()*items.length)].id});buildGrid();render();showT('🎲 Randomized')}
function rst(){Object.keys(INIT).forEach(function(k){st[k]=INIT[k]});buildGrid();render();showT('🔄 Reset')}
function dl(){var e=document.createElement('canvas'),E=1024;e.width=E;e.height=E;var c=e.getContext('2d');c.beginPath();c.arc(E/2,E/2,E/2,0,Math.PI*2);c.clip();c.drawImage(document.getElementById('C'),0,0,E,E);var a=document.createElement('a');a.download='seismic-pfp.png';a.href=e.toDataURL('image/png');a.click();showT('📥 Downloaded')}
function showT(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2500)}

// ═══ INIT ═══
(function(){
  Object.keys(INIT).forEach(function(k){st[k]=INIT[k]});
  var t=document.getElementById('tabs');
  CATS.forEach(function(cat){
    var b=document.createElement('button');b.className='cat-tab'+(cat.k===cur?' active':'');
    b.textContent=cat.i+' '+cat.l;b.onclick=function(){switchCat(cat.k)};t.appendChild(b);
  });
  buildGrid();render();
})();
</script>
