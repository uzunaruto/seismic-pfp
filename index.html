<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seismic PFP Generator</title>
<meta name="description" content="Create your Seismic PFP — 1 base model, infinite trait combos. Canvas-drawn, instant.">
<link rel="icon" href="https://pfp.seismic.website/logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060504;--bg2:#0c0a08;--bg3:#13100d;--bg4:#1a1612;
  --text:#f5f0e8;--text2:#8a7d6d;--text3:#5a5048;--text4:#3a3430;
  --accent:#C19200;--accent2:#ffd866;--accent3:#A87504;
  --glass:rgba(12,10,8,.85);--glass2:rgba(20,16,12,.9);
  --border:rgba(193,146,0,.12);--border2:rgba(245,240,232,.06);
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:rgba(193,146,0,.3);color:var(--text)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text4);border-radius:3px}
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(193,146,0,.06) 0%,transparent 70%);top:-200px;left:-150px;animation:drift 25s infinite ease-in-out}
.bg-orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(6,147,205,.04) 0%,transparent 70%);bottom:-150px;right:-100px;animation:drift 30s infinite ease-in-out reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-30px)}66%{transform:translate(-30px,40px)}}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(193,146,0,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(193,146,0,.02) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,black 30%,transparent 100%)}
.nav{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 20px;width:min(95%,1200px);background:var(--glass2);backdrop-filter:blur(40px) saturate(1.5);border:1px solid var(--border);border-radius:60px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.nav-logo{width:32px;height:32px;border-radius:50%;object-fit:contain;filter:drop-shadow(0 0 6px rgba(193,146,0,.3));border:2px solid var(--border);background:var(--bg3)}
.nav-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:6px}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:50px;font-size:11px;font-weight:600;color:var(--text2);text-decoration:none;border:1px solid var(--border2);transition:all .25s}
.nav-link:hover{color:var(--text);border-color:var(--border);background:rgba(193,146,0,.04)}
.nav-link svg{width:13px;height:13px;fill:currentColor}
.app{max-width:1200px;margin:0 auto;padding:72px 20px 60px;position:relative;z-index:1}
.layout{display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start}
.preview-col{position:sticky;top:80px;display:flex;flex-direction:column;align-items:center;gap:16px}
.preview-wrap{position:relative}
.preview-glow{position:absolute;inset:-16px;border-radius:50%;z-index:0;background:radial-gradient(circle,rgba(193,146,0,.08) 0%,transparent 70%);animation:glow-breathe 4s ease-in-out infinite}
@keyframes glow-breathe{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
.preview-frame{position:relative;z-index:1;width:320px;height:320px;border-radius:50%;overflow:hidden;border:3px solid rgba(193,146,0,.2);box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 30px rgba(193,146,0,.06)}
.preview-frame canvas{width:100%;height:100%;display:block}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s;background:var(--glass);color:var(--text2);letter-spacing:.3px}
.btn:hover{transform:translateY(-2px);border-color:var(--border);color:var(--text);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;border-color:transparent;font-weight:700}
.btn-primary:hover{box-shadow:0 10px 28px rgba(193,146,0,.35);transform:translateY(-3px)}
.controls-col{display:flex;flex-direction:column;gap:14px}
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:12px 14px;background:var(--glass);border:1px solid var(--border2);border-radius:var(--radius)}
.cat-tab{padding:7px 12px;border-radius:var(--radius-xs);border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px;white-space:nowrap}
.cat-tab:hover{border-color:var(--border);color:var(--text2)}
.cat-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(193,146,0,.08);box-shadow:0 0 10px rgba(193,146,0,.1)}
.trait-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:4px}
.trait-btn{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:var(--bg3);border:2px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;padding:4px}
.trait-btn:hover{border-color:var(--border);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.3)}
.trait-btn.active{border-color:var(--accent);box-shadow:0 0 16px rgba(193,146,0,.15),0 0 0 1px rgba(193,146,0,.2) inset}
.trait-btn .preview{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.trait-btn .preview canvas{width:100%;height:100%;border-radius:calc(var(--radius-sm) - 4px)}
.trait-btn .label{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:8px;font-weight:700;color:var(--text);background:rgba(0,0,0,.6);padding:2px 4px;backdrop-filter:blur(4px);letter-spacing:.5px;text-transform:uppercase}
.trait-btn .check{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:900;z-index:2}
.trait-btn.active .check{display:flex}
.trait-btn.none-btn{background:var(--bg4);border-style:dashed}
.trait-btn.none-btn::after{content:'✕';font-size:20px;color:var(--text3)}
.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title h3{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.section-title .count{font-size:11px;color:var(--text3)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);padding:10px 20px;background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius-sm);backdrop-filter:blur(30px);font-size:12px;font-weight:600;color:var(--text);z-index:200;transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 10px 30px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.footer{position:relative;z-index:1;text-align:center;padding:24px;border-top:1px solid var(--border2);margin-top:40px}
.footer p{font-size:11px;color:var(--text3)}
.footer a{color:var(--accent);text-decoration:none;font-weight:600}
@media(max-width:900px){
  .layout{grid-template-columns:1fr;gap:20px}
  .preview-col{position:static}
  .preview-frame{width:280px;height:280px}
  .nav{top:8px;padding:8px 14px;width:97%}
  .trait-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
  .preview-frame{width:240px;height:240px}
  .trait-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="bg-fx"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
<div class="bg-grid"></div>
<nav class="nav">
  <a href="https://seismic-identity.vercel.app" class="nav-brand">
    <img src="https://pfp.seismic.website/logo.svg" alt="Seismic" class="nav-logo" onerror="this.style.display='none'">
    <span class="nav-title">SEISMIC PFP</span>
  </a>
  <div class="nav-links">
    <a href="https://x.com/SeismicSys" target="_blank" rel="noopener" class="nav-link"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>X</a>
    <a href="https://discord.gg/seismic" target="_blank" rel="noopener" class="nav-link"><svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>Discord</a>
  </div>
</nav>
<div class="app">
  <div class="layout">
    <div class="preview-col">
      <div class="preview-wrap">
        <div class="preview-glow"></div>
        <div class="preview-frame">
          <canvas id="previewCanvas" width="800" height="800"></canvas>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="downloadPFP()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download
        </button>
        <button class="btn" onclick="randomize()">
          <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg> Randomize
        </button>
        <button class="btn" onclick="resetAll()">
          <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> Reset
        </button>
      </div>
    </div>
    <div class="controls-col">
      <div class="cat-tabs" id="catTabs"></div>
      <div>
        <div class="section-title">
          <h3 id="catTitle">🎨 Background</h3>
          <span class="count" id="catCount"></span>
        </div>
        <div class="trait-grid" id="traitGrid"></div>
      </div>
    </div>
  </div>
</div>
<footer class="footer"><p>Built for <a href="https://discord.gg/seismic">Seismic</a> · <a href="https://x.com/SeismicSys">@SeismicSys</a></p></footer>
<div class="toast" id="toast"></div>

<script>
// ─── CONSTANTS ───
const S = 800;
const HX = S/2, HY = S*0.32, HR = S*0.19;
const SKIN = '#e8c4a0', SKIN_D = '#c9a07a';

// ─── CATEGORY ORDER ───
const CATS = [
  {key:'Background',icon:'🎨',label:'Background'},
  {key:'Hair',icon:'💇',label:'Hair'},
  {key:'Eyes',icon:'👀',label:'Eyes'},
  {key:'Mouth',icon:'👄',label:'Mouth'},
  {key:'Beard',icon:'🧔',label:'Beard'},
  {key:'Glasses',icon:'🕶️',label:'Glasses'},
  {key:'Hat',icon:'🎩',label:'Hat'},
  {key:'Clothes',icon:'👕',label:'Clothes'},
  {key:'Tattoo',icon:'✒️',label:'Tattoo'},
  {key:'Accessory',icon:'💎',label:'Accessory'},
];

// ─── DRAW FUNCTIONS (named, no nesting issues) ───
const DRAW = {
  // Backgrounds
  bg_obsidian: function(c){c.fillStyle='#0a0a0f';c.fillRect(0,0,S,S)},
  bg_copper: function(c){var g=c.createRadialGradient(S/2,S/2,0,S/2,S/2,S*0.7);g.addColorStop(0,'#2a1a08');g.addColorStop(1,'#0a0504');c.fillStyle=g;c.fillRect(0,0,S,S)},
  bg_midnight: function(c){var g=c.createLinearGradient(0,0,S,S);g.addColorStop(0,'#0a0a2e');g.addColorStop(1,'#0f0a1e');c.fillStyle=g;c.fillRect(0,0,S,S)},
  bg_forest: function(c){var g=c.createRadialGradient(S/2,S/2,0,S/2,S/2,S*0.7);g.addColorStop(0,'#0a1a0a');g.addColorStop(1,'#040804');c.fillStyle=g;c.fillRect(0,0,S,S)},
  bg_crimson: function(c){var g=c.createRadialGradient(S/2,S/2,0,S/2,S/2,S*0.7);g.addColorStop(0,'#1a0808');g.addColorStop(1,'#080202');c.fillStyle=g;c.fillRect(0,0,S,S)},
  bg_ocean: function(c){var g=c.createLinearGradient(0,0,0,S);g.addColorStop(0,'#061220');g.addColorStop(1,'#0a1a30');c.fillStyle=g;c.fillRect(0,0,S,S)},
  bg_gold: function(c){var g=c.createRadialGradient(S/2,S/2,0,S/2,S/2,S*0.7);g.addColorStop(0,'#2a2008');g.addColorStop(1,'#0a0800');c.fillStyle=g;c.fillRect(0,0,S,S)},
  bg_cyber: function(c){
    var g=c.createLinearGradient(0,0,S,S);g.addColorStop(0,'#080a1a');g.addColorStop(1,'#0a0818');
    c.fillStyle=g;c.fillRect(0,0,S,S);
    c.strokeStyle='rgba(0,255,200,0.03)';c.lineWidth=1;
    for(var i=0;i<S;i+=40){c.beginPath();c.moveTo(i,0);c.lineTo(i,S);c.stroke();c.beginPath();c.moveTo(0,i);c.lineTo(S,i);c.stroke()}
  },

  // Hair
  hair_spiky: function(c){
    c.fillStyle='#2a1a0a';c.beginPath();
    for(var a=-2.5;a<=0.5;a+=0.35){
      var x=HX+Math.cos(a)*HR*1.15, y=HY+Math.sin(a)*HR*1.15;
      var h=55+Math.random()*20, w=22+Math.random()*10;
      c.moveTo(x-w,y);c.quadraticCurveTo(x,y-h,x+w,y);
    }
    c.fill();
  },
  hair_undercut: function(c){
    c.fillStyle='#1a0e06';c.beginPath();c.arc(HX,HY,HR*1.06,-2.6,-0.5);c.fill();
    c.fillStyle='#3a2410';c.beginPath();c.ellipse(HX+10,HY-HR*0.75,HR*0.55,HR*0.35,0,0,Math.PI*2);c.fill();
  },
  hair_wavy: function(c){
    c.fillStyle='#3a2010';c.beginPath();
    for(var a=-2.6;a<=0.4;a+=0.2){
      var r=HR*(1.08+0.12*Math.sin(a*8));
      var x=HX+Math.cos(a)*r, y=HY+Math.sin(a)*r;
      var ox=Math.cos(a)*20*(1+0.5*Math.sin(a*5)), oy=15+10*Math.sin(a*4);
      c.moveTo(x-18,y);c.quadraticCurveTo(x+ox,y-oy,x+18,y);
    }
    c.fill();
  },
  hair_bowl: function(c){
    c.fillStyle='#1a1008';c.beginPath();c.arc(HX,HY-10,HR*1.08,-2.8,-0.3);
    c.quadraticCurveTo(HX+HR*0.6,HY+HR*0.2,HX-HR*0.3,HY+HR*0.15);c.fill();
  },
  hair_mohawk: function(c){
    c.fillStyle='#1a0a04';c.beginPath();
    for(var i=0;i<8;i++){
      var x=HX-15+i*4, y=HY-HR*1.05-i*8, h=65+i*5, w=20-i*1.5;
      c.moveTo(x-w,y);c.quadraticCurveTo(x,y-h,x+w,y);
    }
    c.fill();
  },
  hair_buzz: function(c){
    c.fillStyle='rgba(30,18,8,0.7)';c.beginPath();c.arc(HX,HY,HR*1.04,0,Math.PI*2);c.fill();
  },
  hair_afro: function(c){
    c.fillStyle='#1a0e06';c.beginPath();c.ellipse(HX,HY-HR*0.2,HR*1.6,HR*1.5,0,0,Math.PI*2);c.fill();
    for(var i=0;i<25;i++){
      var a=Math.random()*Math.PI*2, r=HR*(0.5+Math.random()*0.9);
      var cx=HX+Math.cos(a)*r, cy=HY-HR*0.2+Math.sin(a)*r*0.9;
      c.beginPath();c.arc(cx,cy,15+Math.random()*12,0,Math.PI*2);c.fill();
    }
  },
  hair_sideshave: function(c){
    c.fillStyle='rgba(20,12,4,0.4)';c.beginPath();c.arc(HX,HY,HR*1.04,0,Math.PI*2);c.fill();
    c.fillStyle='#2a1a0a';c.beginPath();c.ellipse(HX-HR*0.6,HY-HR*0.5,HR*0.7,HR*0.5,-0.3,0,Math.PI*2);c.fill();
  },
  hair_ponytail: function(c){
    c.fillStyle='#2a1a08';c.beginPath();c.arc(HX,HY,HR*1.04,0,Math.PI*2);c.fill();
    c.beginPath();c.moveTo(HX+HR*0.3,HY+HR*0.8);
    c.quadraticCurveTo(HX+HR*0.8,HY+HR*0.5,HX+HR*0.6,HY+HR*1.6);
    c.quadraticCurveTo(HX+HR*0.5,HY+HR*1.8,HX+HR*0.2,HY+HR*1.2);c.fill();
  },

  // Eyes
  eyes_normal: function(c){
    var ey=HY-5;
    [[-30,0],[30,0]].forEach(function(p){
      var dx=p[0];
      c.fillStyle='#fff';c.beginPath();c.ellipse(HX+dx,ey,22,18,0,0,Math.PI*2);c.fill();
      c.fillStyle='#1a0e06';c.beginPath();c.arc(HX+dx+4,ey+2,10,0,Math.PI*2);c.fill();
      c.fillStyle='#fff';c.beginPath();c.arc(HX+dx+7,ey-3,4,0,Math.PI*2);c.fill();
    });
  },
  eyes_anime: function(c){
    var ey=HY-5;
    [[-30,0],[30,0]].forEach(function(p){
      var dx=p[0];
      c.fillStyle='#fff';c.beginPath();c.ellipse(HX+dx,ey,26,22,0,0,Math.PI*2);c.fill();
      var g=c.createRadialGradient(HX+dx+3,ey,0,HX+dx+3,ey,18);
      g.addColorStop(0,'#1a0e06');g.addColorStop(0.7,'#1a0e06');g.addColorStop(0.71,'#fff');g.addColorStop(1,'#fff');
      c.fillStyle=g;c.beginPath();c.arc(HX+dx+3,ey+2,14,0,Math.PI*2);c.fill();
      c.fillStyle='#fff';c.beginPath();c.arc(HX+dx+8,ey-5,5,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(HX+dx-2,ey+4,3,0,Math.PI*2);c.fill();
    });
  },
  eyes_angry: function(c){
    var ey=HY-5;
    [[-30,0],[30,0]].forEach(function(p,i){
      var dx=p[0];
      c.fillStyle='#fff';c.beginPath();c.ellipse(HX+dx,ey+2,22,14,0,0,Math.PI*2);c.fill();
      c.fillStyle='#1a0e06';c.beginPath();c.arc(HX+dx+4,ey+3,10,0,Math.PI*2);c.fill();
      c.fillStyle='#1a0e06';c.beginPath();
      var browY=ey-22;
      c.moveTo(HX+dx+(i?-18:18),browY-8);c.lineTo(HX+dx+(i?18:-18),browY+4);
      c.lineTo(HX+dx+(i?18:-18),browY+10);c.lineTo(HX+dx+(i?-18:18),browY-2);c.fill();
    });
  },
  eyes_happy: function(c){

    for(var i=0;i<8;i++){c.lineTo(HX-30+i*9,HY+HR*1.85+Math.sin(i*1.5)*15)}
    c.stroke();
    c.fillStyle='rgba(200,40,40,0.5)';c.beginPath();
    c.moveTo(HX+33,HY+HR*1.95);c.lineTo(HX+43,HY+HR*1.85);c.lineTo(HX+33,HY+HR*2.05);c.fill();
  },
  tattoo_flame: function(c){
    var g=c.createLinearGradient(HX,HY+HR*2.5,HX,HY+HR*1.7);
    g.addColorStop(0,'rgba(255,100,0,0.5)');g.addColorStop(0.5,'rgba(255,200,0,0.4)');g.addColorStop(1,'rgba(255,50,0,0.3)');
    c.fillStyle=g;c.beginPath();
    for(var i=0;i<6;i++){var x=HX-25+i*10,b=HY+HR*2.4,t=b-20-Math.random()*25;c.moveTo(x-6,b);c.quadraticCurveTo(x,t,x+6,b)}
    c.fill();
  },

  // Accessory
  acc_chain: function(c){
    c.strokeStyle='#C19200';c.lineWidth=3;c.beginPath();c.arc(HX,HY+HR*1.5,HR*0.6,0.3,Math.PI-0.3);c.stroke();
    c.fillStyle='#ffd866';c.beginPath();c.arc(HX,HY+HR*2.0,8,0,Math.PI*2);c.fill();
    c.fillStyle='#C19200';c.beginPath();c.arc(HX,HY+HR*2.0,5,0,Math.PI*2);c.fill();
  },
  acc_earring: function(c){
    c.fillStyle='#C19200';c.beginPath();c.arc(HX-HR*0.85,HY+15,6,0,Math.PI*2);c.fill();
    c.fillStyle='#ffd866';c.beginPath();c.arc(HX-HR*0.85,HY+24,4,0,Math.PI*2);c.fill();
  },
  acc_bowtie: function(c){
    c.fillStyle='#e04040';c.beginPath();
    c.moveTo(HX,HY+HR*1.5);c.lineTo(HX-25,HY+HR*1.35);c.lineTo(HX-25,HY+HR*1.65);c.closePath();c.fill();
    c.beginPath();c.moveTo(HX,HY+HR*1.5);c.lineTo(HX+25,HY+HR*1.35);c.lineTo(HX+25,HY+HR*1.65);c.closePath();c.fill();
    c.fillStyle='#c03030';c.beginPath();c.arc(HX,HY+HR*1.5,6,0,Math.PI*2);c.fill();
  },
  acc_scarf: function(c){
    c.fillStyle='#2a6a4a';c.beginPath();c.ellipse(HX,HY+HR*1.3,HR*0.8,18,0,0,Math.PI*2);c.fill();
    c.fillStyle='#2a6a4a';c.beginPath();
    c.moveTo(HX+HR*0.4,HY+HR*1.35);c.quadraticCurveTo(HX+HR*0.5,HY+HR*2.0,HX+HR*0.3,HY+HR*2.3);
    c.lineTo(HX+HR*0.5,HY+HR*2.3);c.quadraticCurveTo(HX+HR*0.7,HY+HR*2.0,HX+HR*0.6,HY+HR*1.35);c.fill();
    c.fillStyle='#1a5a3a';
    for(var i=-0.6;i<=0.6;i+=0.3){
      c.beginPath();c.rect(HX+HR*i-8,HY+HR*1.25,16,HR*0.1);c.fill();
    }
  },
  acc_bandana: function(c){
    c.fillStyle='#e04040';c.beginPath();c.arc(HX,HY-HR*0.25,HR*1.06,-2.7,-0.4);
    c.lineTo(HX+HR*0.8,HY+HR*0.3);c.quadraticCurveTo(HX+HR*0.4,HY+HR*0.1,HX,HY+HR*0.15);
    c.quadraticCurveTo(HX-HR*0.4,HY+HR*0.1,HX-HR*0.8,HY+HR*0.3);c.fill();
    c.fillStyle='#c03030';c.beginPath();
    c.moveTo(HX+HR*0.75,HY+HR*0.3);c.quadraticCurveTo(HX+HR*1.0,HY+HR*0.8,HX+HR*0.6,HY+HR*1.0);
    c.quadraticCurveTo(HX+HR*0.9,HY+HR*0.6,HX+HR*0.75,HY+HR*0.3);c.fill();
  },
  acc_halo: function(c){
    c.strokeStyle='#ffd866';c.lineWidth=4;c.globalAlpha=0.6;
    c.beginPath();c.ellipse(HX,HY-HR*1.3,HR*0.65,12,0,0,Math.PI*2);c.stroke();
    c.strokeStyle='#C19200';c.lineWidth=2;
    c.beginPath();c.ellipse(HX,HY-HR*1.3,HR*0.55,8,0,0,Math.PI*2);c.stroke();
    c.globalAlpha=1;
  },
};

// ─── HELPER FUNCTIONS ───
function drawStar(c,cx,cy,outerR,innerR,fill){
  c.fillStyle=fill;c.beginPath();
  for(var i=0;i<10;i++){var r=i%2?innerR:outerR,a=Math.PI/2+i*Math.PI/5;c[i===0?'moveTo':'lineTo'](cx+Math.cos(a)*r,cy-Math.sin(a)*r)}
  c.closePath();c.fill();
}

function drawSkullShape(c,cx,cy,s){
  c.beginPath();c.arc(cx,cy,s*0.7,s*0.7,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(0,0,0,0.4)';c.beginPath();c.arc(cx-s*0.25,cy-s*0.1,s*0.2,0,Math.PI*2);c.arc(cx+s*0.25,cy-s*0.1,s*0.2,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(0,0,0,0.3)';c.beginPath();c.moveTo(cx,cy+s*0.1);c.lineTo(cx-s*0.15,cy+s*0.4);c.lineTo(cx+s*0.15,cy+s*0.4);c.fill();
}

// ─── STATE ───
var state = {};
var activeCat = 'Background';

// ─── DRAW BASE CHARACTER (bald) ───
function drawBase(c){
  // Ears
  c.fillStyle=SKIN;
  c.beginPath();c.ellipse(HX-HR*0.92,HY,16,22,0,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(HX+HR*0.92,HY,16,22,0,0,Math.PI*2);c.fill();
  c.fillStyle=SKIN_D;
  c.beginPath();c.ellipse(HX-HR*0.92,HY,8,12,0,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(HX+HR*0.92,HY,8,12,0,0,Math.PI*2);c.fill();
  // Head
  c.fillStyle=SKIN;c.beginPath();c.arc(HX,HY,HR,0,Math.PI*2);c.fill();
  // Neck
  c.fillStyle=SKIN;
  var neckY=HY+HR*0.85;c.fillRect(HX-25,neckY,50,HY+HR*1.5-neckY);
  // Body
  c.fillStyle=SKIN_D;c.beginPath();
  c.moveTo(HX-HR*0.7,HY+HR*1.0);
  c.quadraticCurveTo(HX-HR*1.0,HY+HR*1.3,HX-HR*0.85,HY+HR*1.8);
  c.lineTo(HX-HR*0.9,S*0.85);c.lineTo(HX+HR*0.9,S*0.85);
  c.lineTo(HX+HR*0.85,HY+HR*1.8);
  c.quadraticCurveTo(HX+HR*1.0,HY+HR*1.3,HX+HR*0.7,HY+HR*1.0);c.closePath();c.fill();
  // Nose
  c.fillStyle=SKIN_D;c.beginPath();
  c.moveTo(HX,HY+8);c.lineTo(HX-8,HY+25);c.lineTo(HX+8,HY+25);c.closePath();c.fill();
  // Default smile
  c.strokeStyle='#8a5a3a';c.lineWidth=3;c.lineCap='round';
  c.beginPath();c.arc(HX,HY+38,16,0.2,Math.PI-0.2);c.stroke();
}

// ─── RENDER PREVIEW ───
function renderPreview(){
  var canvas=document.getElementById('previewCanvas');
  var c=canvas.getContext('2d');
  canvas.width=S;canvas.height=S;
  c.clearRect(0,0,S,S);
  c.save();
  c.beginPath();c.arc(S/2,S/2,S/2,0,Math.PI*2);c.clip();

  // Background
  var bg=ITEMS.Background.find(function(b){return b.id===state.Background});
  if(bg&&bg.draw&&DRAW[bg.draw])DRAW[bg.draw](c);

  // Base
  drawBase(c);

  // Trait layers in order
  var drawOrder=['Tattoo','Clothes','Beard','Mouth','Eyes','Glasses','Hair','Hat','Accessory'];
  drawOrder.forEach(function(cat){
    var id=state[cat];
    if(!id||id==='none')return;
    var item=ITEMS[cat].find(function(i){return i.id===id});
    if(item&&item.draw&&DRAW[item.draw])DRAW[item.draw](c);
  });

  c.restore();
}

// ─── BUILD TRAIT GRID ───
function buildTraitGrid(){
  var grid=document.getElementById('traitGrid');
  var items=ITEMS[activeCat]||[];
  var cat=CATS.find(function(c){return c.key===activeCat});

  document.getElementById('catTitle').textContent=cat.icon+' '+cat.label;
  var sel=0;for(var k in state){if(state[k]&&state[k]!=='none')sel++}
  document.getElementById('catCount').textContent=sel+' trait(s) selected';
  grid.innerHTML='';

  items.forEach(function(item){
    var btn=document.createElement('button');
    btn.className='trait-btn'+(state[activeCat]===item.id?' active':'');
    if(item.id==='none')btn.classList.add('none-btn');

    // Mini preview canvas
    var preview=document.createElement('div');preview.className='preview';
    var tc=document.createElement('canvas');tc.width=120;tc.height=120;
    var tctx=tc.getContext('2d');
    tctx.save();tctx.beginPath();tctx.arc(60,60,60,0,Math.PI*2);tctx.clip();
    if(activeCat==='Background'){
      if(item.draw&&DRAW[item.draw])DRAW[item.draw](tctx);
      tctx.save();tctx.translate(-S/2+60,-S/2+60);tctx.scale(120/S,120/S);drawBase(tctx);tctx.restore();
    } else {
      tctx.fillStyle='#13100d';tctx.fillRect(0,0,120,120);
      tctx.save();tctx.translate(-S/2+60,-S/2+60);tctx.scale(120/S,120/S);
      drawBase(tctx);
      if(item.id!=='none'&&item.draw&&DRAW[item.draw])DRAW[item.draw](tctx);
      tctx.restore();
    }
    tctx.restore();
    preview.appendChild(tc);btn.appendChild(preview);

    var check=document.createElement('span');check.className='check';check.textContent='✓';btn.appendChild(check);
    var label=document.createElement('span');label.className='label';label.textContent=item.label;btn.appendChild(label);
    btn.onclick=function(){selectItem(activeCat,item.id)};
    grid.appendChild(btn);
  });
}

function switchCategory(key){
  activeCat=key;
  document.querySelectorAll('.cat-tab').forEach(function(t,i){t.classList.toggle('active',CATS[i].key===key)});
  buildTraitGrid();
}

function selectItem(cat,id){
  state[cat]=id;buildTraitGrid();renderPreview();
}

// ─── ACTIONS ───
function randomize(){
  CATS.forEach(function(cat){
    var items=ITEMS[cat.key];state[cat.key]=items[Math.floor(Math.random()*items.length)].id;
  });
  buildTraitGrid();renderPreview();showToast('🎲 Randomized');
}

function resetAll(){
  CATS.forEach(function(cat){state[cat.key]=ITEMS[cat.key][0].id});
  buildTraitGrid();renderPreview();showToast('🔄 Reset');
}

function downloadPFP(){
  var exp=document.createElement('canvas');var E=1024;exp.width=E;exp.height=E;
  var c=exp.getContext('2d');
  c.beginPath();c.arc(E/2,E/2,E/2,0,Math.PI*2);c.clip();
  c.drawImage(document.getElementById('previewCanvas'),0,0,E,E);
  var a=document.createElement('a');a.download='seismic-pfp.png';a.href=exp.toDataURL('image/png');a.click();
  showToast('📥 Downloaded');
}

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2500);
}

// ─── INIT ───
(function(){
  CATS.forEach(function(cat){state[cat.key]=ITEMS[cat.key][0].id});
  var tabsEl=document.getElementById('catTabs');
  CATS.forEach(function(cat){
    var btn=document.createElement('button');
    btn.className='cat-tab'+(cat.key===activeCat?' active':'');
    btn.textContent=cat.icon+' '+cat.label;
    btn.onclick=function(){switchCategory(cat.key)};
    tabsEl.appendChild(btn);
  });
  buildTraitGrid();renderPreview();
})();
</script>
